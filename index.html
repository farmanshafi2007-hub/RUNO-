                                            <p className="text-[9px] font-black text-slate-400 uppercase">Dist</p>
                                            <p className="font-black text-blue-600">{(run.distance/1000).toFixed(2)}k</p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl text-center">
                                            <p className="text-[9px] font-black text-slate-400 uppercase">Time</p>
                                            <p className="font-black text-slate-800">{formatTime(run.duration)}</p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl text-center">
                                            <p className="text-[9px] font-black text-slate-400 uppercase">Pace</p>
                                            <p className="font-black text-slate-800">{run.pace}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => handleShareAction(run)} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex justify-center items-center gap-2 active:scale-95 transition-transform">
                                            <Icon name="Share2" size={14} color="white" /> Share
                                        </button>
                                        <button onClick={() => confirmDeleteRun(run.id)} className="w-12 h-[38px] bg-red-100 text-red-600 rounded-xl flex justify-center items-center active:scale-95 transition-transform border border-red-200">
                                            <Icon name="Trash2" size={16} color="#dc2626" />
                                        </button>
                                    </div>
                                </div>
                            ))
                        )}
                        <div className="h-24"></div>
                    </div>
                </div>
            );

            const PublicShareView = () => {
                if(!sharedRunData) return null;
                const r = sharedRunData;
                const km = (r.distance/1000).toFixed(2);
                
                let tagline = "Discipline > Motivation";
                if(km >= 10) tagline = "Endurance Champion";
                else if(r.duration < 1800 && km >= 5) tagline = "Speed Demon";

                return (
                    <div className="absolute inset-0 z-[500] bg-slate-950 text-white flex flex-col justify-center items-center animate__animated animate__fadeIn w-full h-full overflow-hidden">
                        <div className="absolute inset-0 bg-grid opacity-20 pointer-events-none"></div>
                        <div className="absolute inset-0 running-bg-glow opacity-70 pointer-events-none"></div>
                        
                        <div className="relative z-10 w-full max-w-sm px-8 text-center animate__animated animate__zoomIn">
                            <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(37,99,235,0.6)] border border-blue-400">
                                <Icon name="Activity" size={32} color="white" />
                            </div>
                            <h1 className="text-3xl font-black tracking-tighter mb-1 uppercase leading-tight">{r.name}</h1>
                            <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mb-12 flex items-center justify-center gap-2">
                                <Icon name="MapPin" size={12} color="#94a3b8" /> Runo Performance
                            </p>

                            <div className="relative w-64 h-64 mx-auto mb-10">
                                <svg className="absolute inset-0 w-full h-full -rotate-90">
                                    <circle cx="50%" cy="50%" r="120" stroke="rgba(255,255,255,0.05)" strokeWidth="12" fill="transparent" />
                                    <circle cx="50%" cy="50%" r="120" stroke="#22d3ee" strokeWidth="12" fill="transparent" strokeDasharray={2 * Math.PI * 120} strokeDashoffset="0" strokeLinecap="round" style={{filter: 'drop-shadow(0 0 10px rgba(34, 211, 238, 0.6))'}} />
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                    <p className="text-6xl font-black tracking-tighter hero-distance-glow tabular-nums">{km}</p>
                                    <p className="text-sm font-black text-neonCyan uppercase tracking-widest mt-1">Kilometers</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-10">
                                <div className="glass-metric p-5 rounded-3xl">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Time</p>
                                    <p className="text-2xl font-black text-white">{formatTime(r.duration)}</p>
                                </div>
                                <div className="glass-metric p-5 rounded-3xl">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Pace</p>
                                    <p className="text-2xl font-black text-white">{r.pace}</p>
                                </div>
                            </div>

                            <div className="inline-block bg-white/10 backdrop-blur-md px-6 py-2 rounded-full border border-white/20 mb-12">
                                <p className="text-[10px] font-black uppercase tracking-[0.2em] text-white">⚡ {tagline}</p>
                            </div>

                            <button onClick={() => { window.location.hash = ''; window.location.reload(); }} className="w-full py-5 bg-white text-slate-900 rounded-2xl font-black text-sm uppercase tracking-widest fitness-card active:scale-95 transition-transform shadow-[4px_6px_0px_#0f172a] border-2 border-slate-900">
                                Start Your Own Run
                            </button>
                        </div>
                    </div>
                );
            };

            const Run = () => { 
                const missionGoalMeters = 2500; 
                const displayDistance = distance < 1000 ? Math.floor(distance) : (distance / 1000).toFixed(2);
                const displayUnit = distance < 1000 ? "M" : "KM";
                const progressPercent = Math.min(100, (distance / missionGoalMeters) * 100);

                const getGpsDotColor = () => {
                    if (gpsStatus === "ERROR") return "bg-red-500";
                    if (gpsStatus === "POOR SIGNAL" || gpsStatus === "LOCKING...") return "bg-orange-400";
                    if (gpsStatus === "WAITING" || gpsStatus === "CALIBRATING") return "bg-slate-500";
                    return "bg-neonCyan";
                };

                if (lastSummary && !isRunning) {
                    return (
                        <div className="absolute inset-0 z-[60] bg-slate-100 text-slate-900 p-8 flex flex-col justify-between overflow-hidden animate__animated animate__fadeIn w-full h-full">
                            <div className="flex-1 overflow-y-auto custom-scroll pb-10">
                                <header className="flex justify-between items-center mb-12 pt-4">
                                    <h2 className="text-5xl font-black tracking-tighter">Session <br/><span className="text-blue-600">Complete.</span></h2>
                                </header>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="p-6 bg-slate-900 text-white rounded-[2rem] fitness-card">
                                        <p className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-widest">Total Distance</p>
                                        <p className="text-4xl font-black tracking-tighter">
                                            {lastSummary.distance < 1000 ? `${Math.floor(lastSummary.distance)}m` : `${(lastSummary.distance/1000).toFixed(2)}km`}
                                        </p>
                                    </div>
                                    <div className="p-6 bg-blue-50 rounded-[2rem] fitness-card">
                                        <p className="text-[10px] font-black text-blue-600 uppercase mb-2 tracking-widest">Total Time</p>
                                        <p className="text-4xl font-black tracking-tighter text-blue-900">{formatTime(lastSummary.duration)}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="p-6 bg-white rounded-[2.5rem] fitness-card">
                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Avg Pace</p>
                                        <p className="text-2xl font-black text-slate-900">{lastSummary.pace}<span className="text-xs text-slate-500">/km</span></p>
                                    </div>
                                    <div className="p-6 bg-white rounded-[2.5rem] fitness-card">
                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Calories</p>
                                        <p className="text-2xl font-black text-slate-900">~{lastSummary.calories || Math.floor((lastSummary.distance/1000) * 75 * 1.036)}<span className="text-xs text-slate-500">kcal</span></p>
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <button 
                                        onClick={fetchAnalysis} 
                                        disabled={isAnalysisLoading} 
                                        className="w-full py-5 bg-purple-600 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest fitness-card flex justify-center items-center gap-2 mb-4 disabled:opacity-70 active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all"
                                    >
                                        {isAnalysisLoading ? <Icon name="Loader2" className="animate-spin text-white" size={20}/> : <><Icon name="Activity" size={20} color="white"/> Analyze Performance</>}
                                    </button>

                                    {aiAnalysis && (
                                        <div className="p-6 bg-purple-50 border-2 border-slate-900 shadow-[4px_6px_0px_#0f172a] rounded-[2rem] animate__animated animate__fadeInUp">
                                            <p className="text-[10px] font-black text-purple-600 uppercase tracking-widest mb-2 flex items-center gap-1"><Icon name="Zap" size={14} color="#9333ea"/> Coach Insight</p>
                                            <p className="text-sm font-semibold text-purple-900 leading-relaxed">{aiAnalysis}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="pb-8 pt-4 space-y-3">
                                <button onClick={() => handleShareAction(lastSummary)} className="w-full py-5 bg-white text-slate-900 rounded-[2rem] font-black text-sm uppercase tracking-widest border-2 border-slate-900 flex justify-center items-center gap-2 shadow-[2px_4px_0px_#0f172a] active:translate-y-1 transition-all">
                                    <Icon name="Share2" size={20} color="#0f172a" /> Share Link
                                </button>
                                <button onClick={() => setView('home')} className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-xl fitness-card uppercase tracking-widest active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all">RETURN HOME</button>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className={`absolute inset-0 z-[60] bg-slate-950 text-white flex flex-col justify-between animate__animated animate__slideInUp overflow-hidden overscroll-none w-full h-full transition-all duration-700 ${isPaused ? 'brightness-50' : 'brightness-100'}`}>
                        <div className="absolute inset-0 bg-grid opacity-20 pointer-events-none"></div>
                        <div className="absolute inset-0 running-bg-glow pointer-events-none"></div>

                        <header className="relative flex justify-between items-center z-10 p-6 pt-12 w-full">
                            {/* Top Arc from screenshot */}
                            <div className="absolute top-0 left-0 w-full flex justify-center pointer-events-none">
                                <svg width="200" height="40" viewBox="0 0 200 40">
                                    <path d="M 0,40 Q 100,-10 200,40" fill="transparent" stroke="rgba(255,255,255,0.1)" strokeWidth="2" />
                                    <circle cx="100" cy="15" r="4" fill="#22d3ee" />
                                </svg>
                            </div>
                            
                            <div className="flex items-center gap-2 bg-slate-900/80 px-4 py-2 rounded-full border border-slate-800">
                                <div className={`w-2 h-2 rounded-full ${getGpsDotColor()} ${gpsStatus === 'RECORDING' ? '' : 'gps-pulse'}`} />
                                <span className="text-[10px] font-black uppercase tracking-[0.1em] text-slate-300">
                                    {gpsStatus === "RECORDING" ? "GPS ACTIVE" : gpsStatus}
                                </span>
                            </div>
                            
                            <div className="bg-slate-900/80 px-4 py-2 rounded-full border border-slate-800">
                                <p className="text-[10px] font-black text-neonCyan uppercase tracking-[0.1em]">
                                    ELITE SENSORS
                                </p>
                            </div>
                        </header>
                        
                        {/* Distance Display matched to screenshot */}
                        <div className="relative flex-1 flex flex-col items-center justify-center w-full px-4 mt-8">
                            <div className="z-10 text-center animate__animated animate__zoomIn flex flex-col items-center">
                                <h1 className="text-[120px] font-black leading-[0.9] tracking-tighter tabular-nums text-white hero-distance-glow number-pop" style={{ textShadow: '0 0 40px rgba(34,211,238,0.4)' }}>
                                    {displayDistance}
                                </h1>
                                <p className="text-2xl font-black text-neonCyan uppercase tracking-widest mt-2">
                                    {displayUnit}
                                </p>
                            </div>
                        </div>

                        <div className="px-6 mb-12 w-full max-w-lg mx-auto z-10">
                            <div className="grid grid-cols-3 gap-4">
                                {/* Time */}
                                <div className="bg-slate-900/90 border border-slate-800 rounded-3xl p-5 flex flex-col items-center justify-center shadow-lg">
                                    <Icon name="Timer" size={18} color="#64748b" className="mb-2" />
                                    <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1">Time</p>
                                    <p className="text-xl font-black text-white tabular-nums">{formatTime(elapsed)}</p>
                                </div>
                                {/* Pace */}
                                <div className="bg-slate-900/90 border border-slate-800 rounded-3xl p-5 flex flex-col items-center justify-center shadow-lg">
                                    <Icon name="Wind" size={18} color="#64748b" className="mb-2" />
                                    <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1">Pace</p>
                                    <p className="text-xl font-black text-white tabular-nums">{formatPace(elapsed, distance)}</p>
                                </div>
                                {/* Speed */}
                                <div className="bg-slate-900/90 border border-slate-800 rounded-3xl p-5 flex flex-col items-center justify-center shadow-lg">
                                    <Icon name="TrendingUp" size={18} color="#64748b" className="mb-2" />
                                    <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1">Speed</p>
                                    <p className="text-xl font-black text-white tabular-nums">{currentSpeed > 0 ? currentSpeed.toFixed(1) : "0.0"}</p>
                                </div>
                            </div>
                        </div>

                        <div className="relative w-full flex justify-center items-center gap-6 p-8 pb-16 z-20">
                            <button 
                                onClick={togglePause} 
                                className="w-16 h-16 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center active:scale-90 transition-all duration-200"
                            >
                                {isPaused ? <Icon name="Play" size={24} color="white"/> : <Icon name="Pause" size={24} color="white"/>}
                            </button>

                            <button 
                                onClick={stopRun} 
                                className="relative w-24 h-24 rounded-full flex items-center justify-center active:scale-95 transition-all duration-300 group"
                            >
                                <div className="absolute inset-0 rounded-full bg-red-500/20 animate-pulse"></div>
                                <div className="absolute inset-2 rounded-full bg-red-600/40"></div>
                                <div className="relative w-16 h-16 rounded-full bg-red-500 flex items-center justify-center shadow-[0_0_20px_rgba(239,68,68,0.6)]">
                                    <Icon name="Square" size={24} color="white" />
                                </div>
                            </button>
                        </div>

                        {isPaused && (
                            <div className="absolute inset-0 z-50 pointer-events-none flex items-center justify-center">
                                <div className="text-center animate__animated animate__fadeIn">
                                    <div className="bg-white/10 backdrop-blur-md px-8 py-4 rounded-full border border-white/20">
                                        <h3 className="text-2xl font-black uppercase tracking-widest text-white">Paused</h3>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const Profile = () => (
                <div className="absolute inset-0 px-8 pt-6 overflow-y-auto custom-scroll animate__animated animate__fadeIn w-full h-full">
                    <IndianClock />
                    <div className="flex flex-col items-center mb-10 mt-8">
                        <label className="relative block w-36 h-36 rounded-[2.5rem] bg-white flex items-center justify-center mb-6 fitness-card cursor-pointer overflow-hidden profile-pic-container">
                            {userData?.profilePic ? (
                                <img src={userData.profilePic} alt="Profile" className="w-full h-full object-cover" />
                            ) : (
                                <Icon name="User" size={60} color="#cbd5e1" />
                            )}
                            <div className="absolute inset-0 bg-slate-900/60 flex items-center justify-center upload-overlay">
                                <Icon name="Camera" size={32} color="white" />
                            </div>
                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                        </label>

                        <h2 className="text-4xl font-black tracking-tighter text-slate-900 mb-1 uppercase">{userData?.name || 'Athlete'}</h2>
                        <div className="bg-slate-900 text-blue-400 px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mt-2 border border-slate-700">Premium Account</div>
                    </div>
                    
                    <div className="space-y-5">
                        <div onClick={() => setView('privacy')} className="p-8 bg-white rounded-[2rem] flex justify-between items-center cursor-pointer fitness-card active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center">
                                    <Icon name="Shield" size={24} color="#3b82f6" />
                                </div>
                                <div>
                                    <p className="font-black text-lg uppercase text-slate-900">Data Policy</p>
                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Privacy Controls</p>
                                </div>
                            </div>
                            <Icon name="ChevronRight" size={24} color="#0f172a" />
                        </div>
                        
                        <a href="mailto:farmanshafi2007@gmail.com?subject=Runo Elite Support Request" className="p-8 bg-red-500 text-white rounded-[2rem] flex justify-between items-center cursor-pointer fitness-card active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all block no-underline">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-red-700 rounded-xl flex items-center justify-center border border-red-400">
                                    <Icon name="MessageSquare" size={24} color="white" />
                                </div>
                                <div>
                                    <p className="font-black text-lg uppercase text-white">Support</p>
                                    <p className="text-[10px] font-bold text-red-200 uppercase tracking-widest">Submit a Complaint</p>
                                </div>
                            </div>
                            <Icon name="ChevronRight" size={24} color="white" />
                        </a>

                        <div onClick={handleLogoutRequest} className="p-8 bg-white rounded-[2rem] flex justify-between items-center fitness-card active:translate-y-1 cursor-pointer">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center border border-slate-200">
                                    <Icon name="Settings" size={24} color="#64748b" />
                                </div>
                                <p className="font-black text-lg text-gray-600 uppercase">Logout</p>
                            </div>
                            <Icon name="RefreshCcw" size={20} color="#94a3b8" />
                        </div>
                    </div>
                </div>
            );

            const Privacy = () => (
                <div className="fixed inset-0 z-[100] bg-slate-900 text-white flex flex-col animate__animated animate__slideInRight w-full h-full">
                    <header className="px-8 pt-16 pb-8 border-b border-slate-800 bg-slate-900 flex items-center justify-between sticky top-0 z-10">
                        <button onClick={() => setView('profile')} className="p-4 bg-slate-800 rounded-2xl active:scale-95 transition-transform border border-slate-700"><Icon name="ChevronLeft" size={24} color="white"/></button>
                        <h2 className="text-xl font-black tracking-tighter uppercase text-blue-400">Privacy</h2>
                        <div className="w-14"></div>
                    </header>
                    <div className="flex-1 overflow-y-auto p-10 custom-scroll space-y-10 pb-[100px]">
                        <h3 className="text-4xl font-black tracking-tighter leading-tight text-white">Data Handling Protocol.</h3>
                        
                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-blue-400 uppercase tracking-widest">01. Telemetry</h4>
                            <p className="text-slate-400 leading-relaxed text-sm font-medium">We collect fitness telemetry (GPS paths) only while a run is actively recording. This data is kept strictly local to your device.</p>
                        </div>
                        
                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-blue-400 uppercase tracking-widest">02. Analytics</h4>
                            <p className="text-slate-400 leading-relaxed text-sm font-medium">Your workout history and profile image are securely stored locally in your browser storage to provide you with lifetime stats and streak tracking.</p>
                        </div>

                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-blue-400 uppercase tracking-widest">03. Support</h4>
                            <p className="text-slate-400 leading-relaxed text-sm font-medium">If you need your data cleared, simply clear your browser data or reinstall the app. Contact protocol: farmanshafi2007@gmail.com.</p>
                        </div>
                    </div>
                </div>
            );

            const navItems = [
                { id: 'home', icon: 'HomeSolid', label: 'HOME' }, 
                { id: 'stats', icon: 'BarChart2', label: 'STATS' }, 
                { id: 'profile', icon: 'User', label: 'PROFILE' } 
            ];

            const hideDockViews = ['splash', 'onboarding', 'verify_email', 'privacy', 'save_run', 'post_save_share', 'public_share', 'history'];

            return (
                <div className="fixed inset-0 w-full h-full bg-slate-100 overflow-hidden">
                    {view === 'splash' && Splash()}
                    {view === 'home' && Home()}
                    {view === 'stats' && Stats()}
                    {view === 'run' && Run()}
                    {view === 'profile' && Profile()}
                    {view === 'privacy' && Privacy()}
                    {view === 'onboarding' && Onboarding()}
                    {view === 'verify_email' && VerifyEmailView()}
                    {view === 'save_run' && SaveRunModal()}
                    {view === 'post_save_share' && PostSaveShareView()}
                    {view === 'history' && HistoryView()}
                    {view === 'public_share' && PublicShareView()}

                    {/* NEW PRO LOGIC: Universal Custom UI Modal for cross-browser safe interactions */}
                    <GlobalModal />

                    {!hideDockViews.includes(view) && (
                        <div className="nav-dock-container pointer-events-none">
                            <nav className="nav-pill pointer-events-auto mx-auto w-[85%] max-w-[350px]">
                                {navItems.map((item) => {
                                    const isActive = view === item.id;
                                    return (
                                        <button 
                                            key={item.id}
                                            onClick={() => setView(item.id)} 
                                            className={`nav-item ${isActive ? 'active' : 'hover:bg-slate-50'}`}
                                        >
                                            <Icon name={item.icon} size={24} color={isActive ? 'white' : '#64748b'} />
                                            {isActive && <span className="text-[9px] font-black mt-1 text-white">{item.label}</span>}
                                        </button>
                                    );
                                })}
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
