<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runo Fitness | Elite Performance</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons and Animations -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        volt: '#ccff00', // High-energy fitness green
                        dark: '#0f172a'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Crisp light background */
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }

        .custom-scroll {
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .custom-scroll::-webkit-scrollbar { display: none; }

        /* High-Energy UI Elements */
        .fitness-card {
            border: 2px solid #0f172a;
            box-shadow: 4px 6px 0px #0f172a;
            transition: all 0.2s ease;
        }

        .fitness-card:active {
            transform: translate(2px, 3px);
            box-shadow: 2px 3px 0px #0f172a;
        }

        /* Premium Navigation Dock */
        .nav-dock-container {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Visible Box Navigation Buttons */
        .nav-item-box {
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        .nav-item-box.active {
            background-color: #ccff00; /* Volt green */
            border: 2px solid #0f172a; /* Clear black border */
            box-shadow: 0px 4px 0px #0f172a;
            transform: translateY(-4px);
        }
        
        .nav-item-box.active:active {
            transform: translateY(0px);
            box-shadow: 0px 0px 0px #0f172a;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .upload-overlay {
            opacity: 0;
            transition: opacity 0.3s;
        }
        .profile-pic-container:hover .upload-overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ROBUST ICON COMPONENT ---
        const Icon = ({ name, size = 24, className = "", color = "currentColor" }) => {
            const [svgHtml, setSvgHtml] = useState('');
            
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    try {
                        const iconData = window.lucide.icons[name];
                        const childrenHtml = iconData[1].map(child => {
                            const tag = child[0];
                            const attrs = Object.entries(child[1]).map(([k, v]) => `${k}="${v}"`).join(' ');
                            return `<${tag} ${attrs}></${tag}>`;
                        }).join('');
                        
                        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}">${childrenHtml}</svg>`;
                        setSvgHtml(svg);
                    } catch (e) {
                        console.error("Icon Error:", e);
                    }
                }
            }, [name, size, className, color]);

            if (!svgHtml) return <span style={{width: size, height: size, display: 'inline-block'}} />;
            return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: svgHtml }} />;
        };

        // --- HIGH PRECISION GPS SENSOR FUSION ENGINE ---
        class GPSEngine {
            constructor() {
                this.pointBuffer = [];
                this.lastValidPoint = null;
                this.totalDistance = 0;
                this.lastTime = 0;
            }

            haversine(lat1, lon1, lat2, lon2) {
                const R = 6371e3;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + 
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            getMovingAverage(newPoint) {
                // 4. Smoothing Algorithm
                this.pointBuffer.push(newPoint);
                if (this.pointBuffer.length > 5) {
                    this.pointBuffer.shift();
                }
                const sumLat = this.pointBuffer.reduce((sum, p) => sum + p.lat, 0);
                const sumLng = this.pointBuffer.reduce((sum, p) => sum + p.lng, 0);
                return {
                    lat: sumLat / this.pointBuffer.length,
                    lng: sumLng / this.pointBuffer.length,
                    timestamp: newPoint.timestamp
                };
            }

            pause() {
                this.lastValidPoint = null;
                this.pointBuffer = [];
            }

            processPoint(rawPoint) {
                const { latitude, longitude, accuracy } = rawPoint.coords;
                const timestamp = rawPoint.timestamp || Date.now();

                // 1. High Precision Setup: Reject poor accuracy points
                if (accuracy > 20) return { status: 'LOW_ACCURACY' };

                const smoothedPoint = this.getMovingAverage({lat: latitude, lng: longitude, timestamp});

                if (!this.lastValidPoint) {
                    this.lastValidPoint = smoothedPoint;
                    this.lastTime = timestamp;
                    return { distanceAdded: 0, status: 'INIT', point: smoothedPoint };
                }

                const dt = (timestamp - this.lastTime) / 1000; // seconds
                if (dt <= 0) return { status: 'INVALID_TIME' };

                // 2. Smart Distance Calculation
                const dist = this.haversine(
                    this.lastValidPoint.lat, this.lastValidPoint.lng,
                    smoothedPoint.lat, smoothedPoint.lng
                );

                // Validation Filters
                if (dist < 3) return { distanceAdded: 0, status: 'NOISE', point: smoothedPoint };
                if (dist > 50 && dt < 2) return { distanceAdded: 0, status: 'JUMP', point: smoothedPoint };

                // 3. Speed-based Filtering
                const speed = dist / dt; // m/s
                if (speed > 6) return { distanceAdded: 0, status: 'TOO_FAST', point: smoothedPoint };
                if (speed < 0.5) return { distanceAdded: 0, status: 'TOO_SLOW', point: smoothedPoint };

                // 5. Distance Confidence System: Passed all filters -> High Confidence
                const deltaLat = smoothedPoint.lat - this.lastValidPoint.lat;
                const deltaLng = smoothedPoint.lng - this.lastValidPoint.lng;

                this.lastValidPoint = smoothedPoint;
                this.lastTime = timestamp;
                this.totalDistance += dist;

                return { distanceAdded: dist, status: 'MOVING', point: smoothedPoint, deltaLat, deltaLng, speed };
            }
        }

        function App() {
            const [view, setView] = useState('splash');
            const [userData, setUserData] = useState(null);
            const [runs, setRuns] = useState([]);
            
            // Tracking State
            const [isRunning, setIsRunning] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [autoPaused, setAutoPaused] = useState(false);
            const [elapsed, setElapsed] = useState(0);
            const [distance, setDistance] = useState(0);
            const [route, setRoute] = useState([]);
            const [accuracy, setAccuracy] = useState(0);
            const [lastSummary, setLastSummary] = useState(null);

            const timerRef = useRef(null);
            const watchRef = useRef(null);
            const gpsEngineRef = useRef(new GPSEngine());
            const autoPauseTimeoutRef = useRef(null);
            const isPausedRef = useRef(false);
            const autoPausedRef = useRef(false);

            // Sync state with refs for callback access
            useEffect(() => {
                isPausedRef.current = isPaused;
            }, [isPaused]);

            useEffect(() => {
                autoPausedRef.current = autoPaused;
            }, [autoPaused]);

            // Handle App Startup
            useEffect(() => {
                const timer = setTimeout(() => {
                    const saved = localStorage.getItem('runo_user');
                    if (saved) {
                        setUserData(JSON.parse(saved));
                        setView('home');
                    } else {
                        setView('onboarding');
                    }
                }, 2000);
                return () => clearTimeout(timer);
            }, []);

            // Handle Profile Image Upload
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const updatedUser = { ...userData, profilePic: reader.result };
                        setUserData(updatedUser);
                        localStorage.setItem('runo_user', JSON.stringify(updatedUser));
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Start High Precision GPS Tracking
            const startRun = () => {
                setIsRunning(true); setIsPaused(false); setAutoPaused(false); setLastSummary(null);
                setDistance(0); setElapsed(0); setRoute([]);
                gpsEngineRef.current = new GPSEngine();
                
                timerRef.current = setInterval(() => {
                    if (!isPausedRef.current && !autoPausedRef.current) {
                        setElapsed(e => e + 1);
                    }
                }, 1000);
                
                if (navigator.geolocation) {
                    watchRef.current = navigator.geolocation.watchPosition((p) => {
                        setAccuracy(p.coords.accuracy);
                        
                        if (isPausedRef.current) return; // Prevent updates while manually paused

                        const result = gpsEngineRef.current.processPoint(p);
                        
                        if (result.status === 'MOVING') {
                            setAutoPaused(false);
                            setDistance(gpsEngineRef.current.totalDistance);
                            
                            setRoute(r => {
                                const last = r.length > 0 ? r[r.length-1] : {x: 180, y: 180};
                                return [...r, {
                                    x: last.x + (result.deltaLng) * 600000, 
                                    y: last.y - (result.deltaLat) * 600000
                                }];
                            });

                            // 6. Auto Pause / Resume Feature (5s inactivity limit)
                            clearTimeout(autoPauseTimeoutRef.current);
                            autoPauseTimeoutRef.current = setTimeout(() => {
                                setAutoPaused(true);
                            }, 5000);
                        }
                    }, 
                    (err) => {
                        console.warn("GPS Warning/Error:", err.message);
                    }, 
                    {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 5000
                    });
                }
            };

            // Stop GPS Tracking
            const stopRun = () => {
                clearInterval(timerRef.current);
                clearTimeout(autoPauseTimeoutRef.current);
                if (watchRef.current) navigator.geolocation.clearWatch(watchRef.current);
                
                const summary = { id: Date.now(), timestamp: Date.now(), duration: elapsed, distance, pace: distance > 10 ? elapsed / (distance/1000) : 0 };
                setLastSummary(summary);
                
                if (distance > 10) {
                    setRuns(prev => [summary, ...prev]);
                    const updatedUser = { ...userData, streak: (userData?.streak || 0) + 1, totalKm: (userData?.totalKm || 0) + (distance/1000) };
                    setUserData(updatedUser);
                    localStorage.setItem('runo_user', JSON.stringify(updatedUser));
                }
                setIsRunning(false);
            };

            // --- SCREENS ---

            const Splash = () => (
                <div className="h-[100dvh] bg-dark flex flex-col items-center justify-center animate__animated animate__fadeIn">
                    <div className="w-28 h-28 bg-volt rounded-[2rem] rotate-45 flex items-center justify-center shadow-[0_0_50px_rgba(204,255,0,0.4)] animate__animated animate__zoomIn">
                        <Icon name="Activity" size={56} color="#0f172a" className="-rotate-45" />
                    </div>
                    <h1 className="text-white mt-12 font-black tracking-[0.5em] uppercase text-2xl drop-shadow-md">RUNO</h1>
                    <p className="text-volt mt-2 text-[10px] font-bold tracking-widest uppercase">Energy & Focus</p>
                </div>
            );

            const Onboarding = () => (
                <div className="h-[100dvh] bg-dark text-white p-8 flex flex-col justify-center items-center text-center">
                    <div className="w-24 h-24 bg-volt rounded-full flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(204,255,0,0.5)]">
                        <Icon name="Zap" size={48} color="#0f172a" />
                    </div>
                    <h1 className="text-6xl font-black tracking-tighter mb-4 animate__animated animate__fadeInUp">Welcome.</h1>
                    <p className="text-gray-400 mb-20 uppercase tracking-widest text-xs font-bold leading-relaxed">Unleash your potential.<br/>Your fitness journey starts now.</p>
                    
                    <button 
                        onClick={() => { 
                            const newUser = { name: "Athlete", streak: 0, totalKm: 0, shields: 1, joined: Date.now(), profilePic: null };
                            setUserData(newUser); 
                            localStorage.setItem('runo_user', JSON.stringify(newUser));
                            setView('home'); 
                        }} 
                        className="w-full py-6 bg-volt text-dark rounded-[2rem] font-black text-xl fitness-card"
                    >
                        GET STARTED
                    </button>
                </div>
            );

            const Home = () => (
                <div className="h-full px-6 pt-16 pb-[140px] overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <p className="text-xs font-black uppercase tracking-widest text-gray-500">Runo Fitness</p>
                            <h1 className="text-4xl font-black tracking-tighter text-dark">Get After It.</h1>
                        </div>
                        <div className="bg-white px-5 py-2.5 rounded-[1.2rem] font-bold flex items-center gap-2 border-2 border-dark shadow-[2px_3px_0px_#0f172a] text-dark">
                            <Icon name="Flame" size={20} color="#ea580c" /> {userData?.streak || 0}
                        </div>
                    </header>

                    {/* High Energy Target Card */}
                    <div className="relative bg-dark rounded-[2.5rem] p-8 text-white mb-10 border-2 border-dark shadow-[6px_8px_0px_#0f172a] overflow-hidden">
                        <div className="relative z-10">
                            <div className="flex items-center gap-2 mb-4">
                                <div className="w-3 h-3 bg-volt rounded-full animate-pulse"></div>
                                <p className="text-xs font-black uppercase tracking-widest text-gray-300">Today's Mission</p>
                            </div>
                            <h2 className="text-7xl font-black tracking-tighter mb-8 text-volt">2.5 <span className="text-3xl font-bold text-white">KM</span></h2>
                            <button onClick={() => { setView('run'); }} className="w-full py-5 bg-white text-dark rounded-xl font-black text-lg fitness-card uppercase tracking-wide">
                                IGNITE RUN
                            </button>
                        </div>
                        <Icon name="Target" size={250} color="rgba(255,255,255,0.05)" className="absolute -right-10 -bottom-10 pointer-events-none" />
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-10">
                        <div className="p-6 bg-white rounded-[2rem] border-2 border-dark shadow-[4px_6px_0px_#0f172a]">
                            <Icon name="TrendingUp" size={32} color="#0f172a" className="mb-4" />
                            <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Total Distance</p>
                            <p className="text-3xl font-black tracking-tighter text-dark">{(userData?.totalKm || 0).toFixed(1)} <span className="text-sm">KM</span></p>
                        </div>
                        <div className="p-6 bg-volt rounded-[2rem] border-2 border-dark shadow-[4px_6px_0px_#0f172a]">
                            <Icon name="Shield" size={32} color="#0f172a" className="mb-4" />
                            <p className="text-[10px] font-black text-dark uppercase tracking-widest mb-1">Streak Shields</p>
                            <p className="text-3xl font-black tracking-tighter text-dark">{userData?.shields || 1}</p>
                        </div>
                    </div>

                    <h3 className="font-black text-xl tracking-tight mb-6 px-2 text-dark uppercase">Recent Activity</h3>
                    <div className="space-y-4">
                        {runs.length > 0 ? (
                            runs.slice(0,3).map((r, i) => (
                                <div key={r.id} className="p-5 bg-white rounded-2xl flex items-center justify-between border-2 border-gray-200 animate__animated animate__fadeInUp" style={{animationDelay: `${i*0.1}s`}}>
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center border-2 border-gray-200">
                                            <Icon name="Activity" size={20} color="#0f172a" />
                                        </div>
                                        <div>
                                            <p className="text-xl font-black tracking-tighter text-dark">{(r.distance/1000).toFixed(2)} km</p>
                                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{new Date(r.timestamp).toLocaleDateString()}</p>
                                        </div>
                                    </div>
                                    <div className="text-right text-gray-500 text-[10px] font-black uppercase tracking-widest bg-gray-100 py-2 px-3 rounded-lg">
                                        {(r.duration/60).toFixed(0)} MINS
                                    </div>
                                </div>
                            ))
                        ) : (
                            <div className="py-12 text-center border-2 border-dashed border-gray-300 bg-white rounded-[2rem]">
                                <Icon name="ZapOff" size={40} color="#9ca3af" className="mx-auto mb-4" />
                                <p className="text-gray-500 font-bold uppercase tracking-widest text-xs">No runs recorded yet</p>
                            </div>
                        )}
                    </div>
                </div>
            );

            const Stats = () => (
                <div className="h-full bg-f8fafc text-dark px-6 pt-16 pb-[140px] overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                    <header className="mb-10">
                        <p className="text-xs font-black uppercase tracking-widest text-gray-500">Analytics</p>
                        <h1 className="text-4xl font-black tracking-tighter text-dark">Your Progress.</h1>
                    </header>
                    <div className="p-8 bg-gradient-to-br from-orange-400 to-red-500 text-white rounded-[2.5rem] mb-8 border-2 border-dark shadow-[6px_8px_0px_#0f172a]">
                        <div className="flex items-center gap-3 mb-6">
                            <Icon name="Flame" size={36} color="white" />
                            <h2 className="text-5xl font-black tracking-tighter">{userData?.streak || 0} <span className="text-2xl opacity-80">Days</span></h2>
                        </div>
                        <p className="font-bold text-orange-100 uppercase tracking-widest text-xs">Current active streak</p>
                    </div>
                    <div className="p-8 bg-white border-2 border-dark rounded-[2.5rem] shadow-[4px_6px_0px_#0f172a]">
                        <h3 className="font-black text-xl mb-8 uppercase text-dark">Activity Graph</h3>
                        <div className="flex justify-between items-end h-40 px-2 gap-3">
                            {[40, 70, 45, 90, 60, 30, 80].map((h, i) => (
                                <div key={i} className="flex-1 flex flex-col items-center gap-3">
                                    <div className="w-full bg-dark rounded-t-md relative overflow-hidden" style={{ height: `${h}%` }}>
                                        {i === 3 && <div className="absolute inset-0 bg-volt"></div>}
                                    </div>
                                    <span className="text-[10px] font-black text-gray-400">MTWTFSS"[i]</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const Run = () => {
                const circ = 2 * Math.PI * 140;
                // 8. Output precision and stability handled here and in engine validation
                const offset = circ - (Math.min(100, (distance / 5000) * 100) / 100) * circ;

                // Post-Run Summary
                if (lastSummary && !isRunning) {
                    return (
                        <div className="fixed inset-0 z-[60] bg-white text-dark p-8 flex flex-col justify-between overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                            <div>
                                <header className="flex justify-between items-center mb-12">
                                    <h2 className="text-5xl font-black tracking-tighter text-dark">Session <br/><span className="text-volt drop-shadow-md">Complete.</span></h2>
                                </header>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="p-6 bg-dark text-white rounded-[2rem] border-2 border-dark shadow-[4px_6px_0px_#0f172a]">
                                        <p className="text-[10px] font-black text-volt uppercase mb-2 tracking-widest">Total Distance</p>
                                        <p className="text-4xl font-black tracking-tighter">{(lastSummary.distance/1000).toFixed(2)}<span className="text-lg">km</span></p>
                                    </div>
                                    <div className="p-6 bg-white rounded-[2rem] border-2 border-dark shadow-[4px_6px_0px_#0f172a]">
                                        <p className="text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Total Time</p>
                                        <p className="text-4xl font-black tracking-tighter text-dark">{Math.floor(lastSummary.duration/60)}<span className="text-lg">m</span></p>
                                    </div>
                                </div>
                                <div className="p-8 bg-white border-2 border-dark rounded-[2.5rem] mb-6 shadow-[4px_6px_0px_#0f172a]">
                                    <p className="text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Calories Burned</p>
                                    <p className="text-4xl font-black text-dark">~{Math.floor((lastSummary.distance/1000) * 75 * 1.036)} <span className="text-lg">kcal</span></p>
                                </div>
                            </div>
                            <button onClick={() => setView('home')} className="w-full py-6 bg-volt text-dark rounded-[2rem] font-black text-xl border-2 border-dark shadow-[4px_6px_0px_#0f172a] active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest">RETURN HOME</button>
                        </div>
                    );
                }

                // Active Running Screen
                return (
                    <div className="fixed inset-0 z-[60] bg-dark text-white p-8 flex flex-col justify-between animate__animated animate__slideInUp">
                        <header className="flex justify-between items-center z-10">
                            <button onClick={() => !isRunning && setView('home')} className="text-gray-400 font-bold text-xs uppercase hover:text-white transition-colors">{!isRunning ? "Cancel" : ""}</button>
                            <div className="flex items-center gap-3 bg-slate-800 px-5 py-2.5 rounded-full border border-slate-700">
                                <div className={`w-3 h-3 rounded-full ${autoPaused ? 'bg-orange-500' : (isRunning && !isPaused ? 'bg-volt animate-pulse' : 'bg-orange-500')}`} />
                                <span className="text-[10px] font-black uppercase tracking-widest">{autoPaused ? "AUTO-PAUSED" : (isRunning ? "RECORDING" : "READY")}</span>
                            </div>
                            <div className="text-[10px] font-black text-gray-500 uppercase">{accuracy > 0 ? `GPS: ${accuracy.toFixed(0)}m` : '...'}</div>
                        </header>
                        
                        <div className="relative flex-1 flex flex-col items-center justify-center">
                            <svg className="absolute w-[360px] h-[360px] -rotate-90 pointer-events-none">
                                <circle cx="180" cy="180" r="140" stroke="#1e293b" strokeWidth="8" fill="transparent" />
                                <circle cx="180" cy="180" r="140" stroke="#ccff00" strokeWidth="12" fill="transparent" strokeDasharray={circ} style={{ strokeDashoffset: offset }} strokeLinecap="round" className="progress-ring-circle drop-shadow-[0_0_15px_rgba(204,255,0,0.5)]" />
                            </svg>
                            <div className="z-10 text-center animate__animated animate__zoomIn">
                                <p className="text-gray-400 text-[10px] font-black uppercase tracking-[0.4em] mb-4">Distance</p>
                                <h1 className="text-[110px] font-black leading-none tracking-tighter tabular-nums text-white text-glow">{(distance / 1000).toFixed(2)}</h1>
                                <p className="text-xl font-bold text-volt uppercase tracking-widest mt-2">Kilometers</p>
                            </div>
                        </div>

                        <div className="w-full flex justify-center items-center gap-8 mb-10 z-20">
                            {!isRunning ? (
                                <button onClick={startRun} className="w-32 h-32 bg-volt text-dark rounded-full flex items-center justify-center border-4 border-dark shadow-[0_15px_40px_rgba(204,255,0,0.3)] active:scale-95 transition-transform"><Icon name="Play" size={48} color="#0f172a" /></button>
                            ) : (
                                <>
                                    <button onClick={() => {
                                        if (!isPaused) {
                                            setIsPaused(true);
                                            gpsEngineRef.current.pause(); // Reset Engine Buffer
                                            clearTimeout(autoPauseTimeoutRef.current);
                                        } else {
                                            setIsPaused(false);
                                            setAutoPaused(false);
                                        }
                                    }} className="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center border-2 border-slate-600 active:scale-95 transition-all">
                                        {isPaused ? <Icon name="Play" size={32} color="white"/> : <Icon name="Pause" size={32} color="white"/>}
                                    </button>
                                    <button onClick={stopRun} className="w-32 h-32 bg-red-500 rounded-full flex items-center justify-center border-4 border-dark shadow-[0_15px_40px_rgba(239,68,68,0.3)] active:scale-95 transition-transform"><Icon name="Square" size={40} color="#0f172a" /></button>
                                </>
                            )}
                        </div>
                    </div>
                );
            };

            const Profile = () => (
                <div className="h-full bg-gray-50 text-dark px-8 pt-16 pb-[140px] overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                    <div className="flex flex-col items-center mb-10">
                        {/* Profile Picture Upload Container */}
                        <label className="relative block w-36 h-36 rounded-[2.5rem] bg-white border-4 border-dark flex items-center justify-center mb-6 shadow-[6px_8px_0px_#0f172a] cursor-pointer overflow-hidden profile-pic-container">
                            {userData?.profilePic ? (
                                <img src={userData.profilePic} alt="Profile" className="w-full h-full object-cover" />
                            ) : (
                                <Icon name="User" size={60} color="#cbd5e1" />
                            )}
                            <div className="absolute inset-0 bg-dark/60 flex items-center justify-center upload-overlay">
                                <Icon name="Camera" size={32} color="white" />
                            </div>
                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                        </label>

                        <h2 className="text-4xl font-black tracking-tighter text-dark mb-1 uppercase">{userData?.name || 'Athlete'}</h2>
                        <div className="bg-dark text-volt px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mt-2">Elite Status</div>
                    </div>
                    
                    <div className="space-y-5">
                        <div onClick={() => setView('privacy')} className="p-8 bg-white border-2 border-dark rounded-[2rem] flex justify-between items-center cursor-pointer shadow-[4px_6px_0px_#0f172a] active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-dark rounded-xl flex items-center justify-center">
                                    <Icon name="Shield" size={24} color="#ccff00" />
                                </div>
                                <div>
                                    <p className="font-black text-lg uppercase text-dark">Data Policy</p>
                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Privacy Controls</p>
                                </div>
                            </div>
                            <Icon name="ChevronRight" size={24} color="#0f172a" />
                        </div>

                        <div className="p-8 bg-white border-2 border-gray-300 rounded-[2rem] flex justify-between items-center opacity-70">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center">
                                    <Icon name="Settings" size={24} color="#64748b" />
                                </div>
                                <p className="font-black text-lg text-gray-600 uppercase">Settings</p>
                            </div>
                            <Icon name="Lock" size={20} color="#94a3b8" />
                        </div>
                    </div>
                </div>
            );

            const Privacy = () => (
                <div className="fixed inset-0 z-[100] bg-dark text-white flex flex-col animate__animated animate__slideInRight">
                    <header className="px-8 pt-16 pb-8 border-b border-slate-800 bg-dark flex items-center justify-between sticky top-0 z-10">
                        <button onClick={() => setView('profile')} className="p-4 bg-slate-800 rounded-2xl active:scale-95 transition-transform"><Icon name="ChevronLeft" size={24} color="white"/></button>
                        <h2 className="text-xl font-black tracking-tighter uppercase text-volt">Privacy</h2>
                        <div className="w-14"></div>
                    </header>
                    <div className="flex-1 overflow-y-auto p-10 custom-scroll space-y-10">
                        <h3 className="text-4xl font-black tracking-tighter leading-tight">Data Handling Protocol.</h3>
                        
                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-volt uppercase tracking-widest">01. Telemetry</h4>
                            <p className="text-gray-400 leading-relaxed text-sm font-medium">We collect fitness telemetry (GPS paths) only while a run is actively recording. This data is kept strictly local to your device.</p>
                        </div>
                        
                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-volt uppercase tracking-widest">02. Analytics</h4>
                            <p className="text-gray-400 leading-relaxed text-sm font-medium">Your workout history and profile image are securely stored locally in your browser storage to provide you with lifetime stats and streak tracking.</p>
                        </div>

                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-volt uppercase tracking-widest">03. Support</h4>
                            <p className="text-gray-400 leading-relaxed text-sm font-medium">If you need your data cleared, simply clear your browser data or reinstall the app. Contact protocol: farmanshafi2007@gmail.com.</p>
                        </div>
                        
                        <div className="h-32" />
                    </div>
                </div>
            );

            // Nav Configuration for the Box Design
            const navItems = [
                { id: 'home', icon: 'Home', label: 'HOME' },
                { id: 'stats', icon: 'BarChart2', label: 'STATS' },
                { id: 'profile', icon: 'User', label: 'PROFILE' }
            ];

            return (
                <div className="h-[100dvh] w-full bg-gray-50 relative overflow-hidden selection:bg-volt selection:text-dark">
                    {view === 'splash' && <Splash />}
                    {view === 'home' && <Home />}
                    {view === 'stats' && <Stats />}
                    {view === 'run' && <Run />}
                    {view === 'profile' && <Profile />}
                    {view === 'privacy' && <Privacy />}
                    {view === 'onboarding' && <Onboarding />}

                    {/* FIXED BOTTOM NAVIGATION - Distinct Small Boxes with Black Borders */}
                    {['home', 'profile', 'stats'].includes(view) && (
                        <div className="fixed bottom-0 inset-x-0 w-full nav-dock-container z-50 flex justify-center pointer-events-none">
                            <nav className="bg-white border-2 border-dark rounded-[2rem] shadow-[0_8px_30px_rgba(0,0,0,0.15)] px-3 py-2 flex items-center gap-2 pointer-events-auto mx-4 mb-4">
                                {navItems.map((item) => {
                                    const isActive = view === item.id;
                                    return (
                                        <button 
                                            key={item.id}
                                            onClick={() => setView(item.id)} 
                                            className={`flex flex-col items-center justify-center w-[72px] h-[64px] rounded-[1.2rem] nav-item-box ${isActive ? 'active' : 'text-gray-400 hover:bg-gray-100'}`}
                                        >
                                            <Icon name={item.icon} size={22} color={isActive ? '#0f172a' : 'currentColor'} />
                                            <span className={`text-[9px] font-black mt-1 ${isActive ? 'text-dark' : 'text-gray-400'}`}>{item.label}</span>
                                        </button>
                                    );
                                })}
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
