<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runo Fitness | Elite Performance</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons and Animations -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        brandBlue: '#2563eb',
                        brandPurple: '#a855f7',
                        neonCyan: '#22d3ee',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        /* CRITICAL: Lock the screen to prevent jumping up and down */
        body, html {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9; /* Slate 100 - matching screenshot */
            color: #0f172a;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed; /* Freezes the background */
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }

        .custom-scroll {
            height: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 120px; /* Space for the dock */
        }
        .custom-scroll::-webkit-scrollbar { display: none; }

        /* Billion-Dollar Brutalist UI Cards */
        .fitness-card {
            border: 2.5px solid #0f172a;
            box-shadow: 4px 6px 0px #0f172a;
            transition: all 0.2s ease;
        }
        .fitness-card:active {
            transform: translate(2px, 3px);
            box-shadow: 2px 3px 0px #0f172a;
        }

        /* Fixed Navigation Dock at the very bottom */
        .nav-dock-container {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 24px);
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 100;
        }

        .nav-pill {
            background-color: #ffffff;
            border: 2.5px solid #0f172a;
            box-shadow: 4px 6px 0px #0f172a;
            border-radius: 4rem;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item {
            flex: 1;
            height: 64px;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 2.5px solid transparent;
            color: #94a3b8;
        }

        .nav-item.active {
            background-color: #2563eb; 
            border: 2.5px solid #0f172a; 
            box-shadow: 2px 4px 0px #0f172a;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .nav-item.active:active {
            transform: translateY(0px);
            box-shadow: 0px 0px 0px #0f172a;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .indian-timer-glow {
            background: linear-gradient(90deg, #ec4899, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(139, 92, 246, 0.3);
        }

        .text-glow { text-shadow: 0 0 25px rgba(255, 255, 255, 0.4); }
        
        .upload-overlay {
            opacity: 0;
            transition: opacity 0.3s;
        }
        .profile-pic-container:hover .upload-overlay {
            opacity: 1;
        }

        /* CHANGED: Enhanced Realistic Water Animation */
        .water-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2563eb;
            overflow: hidden;
            z-index: 0;
        }

        .water-wave {
            position: absolute;
            bottom: -110%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 43%;
            animation: wave-motion 8s infinite linear;
        }

        .water-wave-secondary {
            position: absolute;
            bottom: -112%;
            left: -55%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40%;
            animation: wave-motion 12s infinite linear;
        }

        .water-wave-tertiary {
            position: absolute;
            bottom: -108%;
            left: -45%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 45%;
            animation: wave-motion 16s infinite linear;
        }

        @keyframes wave-motion {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ADDED: Dark White Border Override */
        .premium-mission-border {
            border: 2.5px solid #e2e8f0 !important;
            box-shadow: 4px 6px 0px #94a3b8 !important;
        }

        /* NEW: HIGH ENERGY RUN SCREEN STYLES */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        .hero-distance-glow {
            text-shadow: 0 0 30px rgba(34, 211, 238, 0.6), 0 0 60px rgba(34, 211, 238, 0.3);
        }

        .glass-metric {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .breathing-pulse {
            animation: ring-pulse 4s ease-in-out infinite;
        }

        @keyframes ring-pulse {
            0%, 100% { opacity: 0.8; stroke-width: 12; }
            50% { opacity: 1; stroke-width: 14; }
        }

        .control-button-stop {
            background: linear-gradient(135deg, #ef4444, #991b1b);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .control-button-pause {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .gps-pulse {
            animation: gps-blink 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes gps-blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
        }

        .running-bg-glow {
            background: radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
        }

        .number-pop {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS ---

                    Pause: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="${color}" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`,

                    ChevronLeft: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="${className}"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
                    ChevronRight: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="${className}"><polyline points="9 18 15 12 9 6"></polyline></svg>`,
                    MessageSquare: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`,
                    Camera: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>`,
                    Zap: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`,
                    Loader2: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>`,
                    RefreshCcw: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>`,
                    Settings: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>`,
                    Lock: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`,
                    Calendar: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="${className}"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`,
                    Timer: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
                    Wind: `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>`
                };
                setSvgHtml(icons[name] || '');
            }, [name, size, className, color]);

            if (!svgHtml) return <span style={{width: size, height: size, display: 'inline-block'}} />;
            return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: svgHtml }} />;
        };

        // --- INDIAN TIMER COMPONENT ---
        const IndianClock = () => {
            const [time, setTime] = useState("");
            useEffect(() => {
                const tick = () => {
                    const options = { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                    setTime(new Intl.DateTimeFormat('en-IN', options).format(new Date()));
                };
                const timerId = setInterval(tick, 1000);
                tick();
                return () => clearInterval(timerId);
            }, []);
            
            return (
                <div className="fixed top-2 left-1/2 -translate-x-1/2 z-[999] pointer-events-none transition-all duration-300" style={{ marginTop: 'env(safe-area-inset-top, 8px)' }}>
                    <div className="bg-black/90 backdrop-blur-md text-white px-3 py-1.5 rounded-full flex items-center justify-center gap-2 border border-white/10 shadow-[0_8px_20px_rgba(0,0,0,0.4)]">
                        <div className="w-1.5 h-1.5 rounded-full bg-[#ccff00] animate-pulse shadow-[0_0_8px_#ccff00]"></div>
                        <span className="text-[9px] font-black tracking-widest text-white/50 uppercase">IST</span>
                        <span className="text-[10px] font-black tabular-nums">{time}</span>
                    </div>
                </div>
            );
        };

        // --- GEMINI API INTEGRATION ---
        const apiKey = ""; 
        const callGemini = async (prompt, systemPrompt = "You are Runo Elite AI, a high-performance fitness coach.") => {
            let retries = 0;
            while (retries < 3) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    retries++;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        };

        // --- SENSOR FUSION ENGINE (Production-Level Real-Time Tracking) --- // Improved sensitivity for real-time meters
        class GPSEngine {
            constructor() {
                this.lastValidPoint = null;
                this.totalDistance = 0; // meters
                this.lastTime = 0;
                this.lowSpeedDuration = 0;
                this.consecutiveGoodAccuracyCount = 0;
                this.isLocked = false;
            }

            haversine(lat1, lon1, lat2, lon2) {
                const R = 6371e3; // Earth radius in meters
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            pause() {
                this.lastValidPoint = null;
                this.lowSpeedDuration = 0;
            }

            processPoint(rawPoint) {
                const { latitude, longitude, accuracy } = rawPoint.coords;
                const timestamp = rawPoint.timestamp || Date.now();

                // 1. Accuracy Filter (Accept positions <= 60m for starting, then tighten)
                if (accuracy > 60) return { status: 'LOW_ACCURACY', distance: this.totalDistance, accuracy };

                // 2. GPS Lock System (Wait for initial stability)
                if (!this.isLocked) {
                    if (accuracy <= 40) {
                        this.consecutiveGoodAccuracyCount++;
                        if (this.consecutiveGoodAccuracyCount >= 2) { // Locked after 2 good pings
                            this.isLocked = true;
                            this.lastValidPoint = { lat: latitude, lng: longitude };
                            this.lastTime = timestamp;
                            return { status: 'LOCKED', distance: this.totalDistance, accuracy };
                        }
                    }
                    return { status: 'LOCKING', distance: this.totalDistance, accuracy };
                }

                // 3. Time Difference
                const dt = (timestamp - this.lastTime) / 1000; 
                if (dt <= 0) return { status: 'INVALID_TIME', distance: this.totalDistance, accuracy };

                // 4. Distance Calculation (Haversine)
                const dist = this.haversine(this.lastValidPoint.lat, this.lastValidPoint.lng, latitude, longitude);

                // 5. Noise and Jump Filtering (Strava-like filtering)
                const speedMs = dist / dt;
                
                // Speed threshold: 0.2 m/s (approx 0.7 km/h) to avoid "GPS drift" distance while standing still
                if (speedMs < 0.2) {
                    this.lowSpeedDuration += dt;
                    if (this.lowSpeedDuration >= 10) return { status: 'AUTO_PAUSED', distance: this.totalDistance, accuracy, speed: 0 };
                    return { status: 'STATIONARY', distance: this.totalDistance, accuracy };
                }

                // Jump filter: Ignore speeds > 12 m/s (43 km/h) as it's likely a GPS glitch or driving
                if (speedMs > 12) return { status: 'JUMP', distance: this.totalDistance, accuracy };
                
                // 6. Valid Movement // Added distance only if moved more than 1.5m to keep meter stable
                if (dist > 1.5) {
                    this.totalDistance += dist;
                    this.lastValidPoint = { lat: latitude, lng: longitude };
                    this.lastTime = timestamp;
                    this.lowSpeedDuration = 0;
                    return { status: 'MOVING', distance: this.totalDistance, accuracy, speed: speedMs * 3.6 };
                }

                return { status: 'NOISE', distance: this.totalDistance, accuracy };
            }
        }

        function App() {
            // Global State
            const [view, setView] = useState('splash');
            const [userData, setUserData] = useState(null);
            const [runs, setRuns] = useState([]); 
            const [vibe, setVibe] = useState("");

            // UI Render State
            const [isRunning, setIsRunning] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [autoPaused, setAutoPaused] = useState(false);
            const [elapsed, setElapsed] = useState(0);
            const [distance, setDistance] = useState(0); 
            const [currentSpeed, setCurrentSpeed] = useState(0); 
            const [accuracy, setAccuracy] = useState(0);
            const [gpsStatus, setGpsStatus] = useState("WAITING");
            const [lastSummary, setLastSummary] = useState(null);

            // AI States
            const [aiBriefing, setAiBriefing] = useState(null);
            const [isBriefingLoading, setIsBriefingLoading] = useState(false);
            const [aiWorkout, setAiWorkout] = useState(null);
            const [isWorkoutLoading, setIsWorkoutLoading] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState(null);
            const [isAnalysisLoading, setIsAnalysisLoading] = useState(false);

            // Tracking Refs (Source of Truth for Stable Timer)
            const runDataRef = useRef({ startTime: 0, totalPausedTime: 0, pauseStartTime: 0, distance: 0, speed: 0, lastUiUpdate: 0 });
            const rAFRef = useRef(null);
            const watchRef = useRef(null);
            const gpsEngineRef = useRef(new GPSEngine());
            
            const isPausedRef = useRef(false);
            useEffect(() => { isPausedRef.current = isPaused; }, [isPaused]);

            // Startup & User Loading
            useEffect(() => {
                const timer = setTimeout(() => {
                    try {
                        const savedUser = localStorage.getItem('runo_user');
                        const savedRuns = localStorage.getItem('runo_history');
                        
                        if (savedUser) {
                            setUserData(JSON.parse(savedUser));
                            if (savedRuns) setRuns(JSON.parse(savedRuns));
                            setView('home');
                        } else {
                            setView('onboarding');
                        }
                    } catch (e) {
                        setView('onboarding');
                    }
                }, 1500);
                return () => clearTimeout(timer);
            }, []);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const updatedUser = { ...userData, profilePic: reader.result };
                        setUserData(updatedUser);
                        try { localStorage.setItem('runo_user', JSON.stringify(updatedUser)); } catch (err) {}
                    };
                    reader.readAsDataURL(file);
                }
            };

            // --- TRACKING LOGIC ---
            const updateUI = useCallback(() => {
                const now = Date.now();
                if (now - runDataRef.current.lastUiUpdate >= 250) { // Higher frequency for smoother feel
                    let elapsedMs = 0;
                    if (isPausedRef.current) {
                        elapsedMs = runDataRef.current.pauseStartTime - runDataRef.current.startTime - runDataRef.current.totalPausedTime;
                    } else {
                        elapsedMs = now - runDataRef.current.startTime - runDataRef.current.totalPausedTime;
                    }
                    
                    setElapsed(Math.max(0, Math.floor(elapsedMs / 1000)));
                    setDistance(runDataRef.current.distance);
                    setCurrentSpeed(runDataRef.current.speed);
                    runDataRef.current.lastUiUpdate = now;
                }
                rAFRef.current = requestAnimationFrame(updateUI);
            }, []);

            // Permission handling and High Accuracy initialization
            const startRun = async () => {
                // 1. Request Permission explicitly
                if (navigator.permissions) {
                    try {
                        await navigator.permissions.query({ name: 'geolocation' });
                    } catch (e) {}
                }

                setIsRunning(true); 
                setIsPaused(false); 
                setAutoPaused(false); 
                setLastSummary(null); 
                setAiAnalysis(null);
                setDistance(0); 
                setElapsed(0); 
                setCurrentSpeed(0);
                setGpsStatus("WAITING");

                gpsEngineRef.current = new GPSEngine();
                runDataRef.current = { 
                    startTime: Date.now(), 
                    totalPausedTime: 0, 
                    pauseStartTime: 0, 
                    distance: 0, 
                    speed: 0, 
                    lastUiUpdate: 0 
                };

                if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
                rAFRef.current = requestAnimationFrame(updateUI);
                
                if (navigator.geolocation) {
                    // Start tracking with high accuracy settings
                    watchRef.current = navigator.geolocation.watchPosition((p) => {
                        setAccuracy(p.coords.accuracy);
                        
                        if (isPausedRef.current) return; 

                        const result = gpsEngineRef.current.processPoint(p);
                        
                        // Real-time GPS status updates
                        if (result.status === 'LOW_ACCURACY') {
                            setGpsStatus("POOR SIGNAL");
                            return;
                        }

                        if (result.status === 'LOCKING') {
                            setGpsStatus("LOCKING...");
                            return;
                        }

                        setGpsStatus("RECORDING");

                        if (result.status === 'MOVING' || result.status === 'LOCKED' || result.status === 'STATIONARY') {
                            if (autoPaused) setAutoPaused(false);
                            runDataRef.current.distance = result.distance;
                            runDataRef.current.speed = result.speed || 0;
                        } else if (result.status === 'AUTO_PAUSED') {
                            if (!autoPaused) {
                                setAutoPaused(true);
                                runDataRef.current.speed = 0;
                            }
                        }
                    }, (err) => {
                        console.error("GPS Error:", err);
                        setGpsStatus("ERROR");
                        alert("Please enable Location Services/GPS to track your run.");
                    }, { 
                        enableHighAccuracy: true, 
                        maximumAge: 0, 
                        timeout: 10000 
                    });
                } else {
                    alert("Geolocation is not supported by your browser.");
                }
            };

            const stopRun = () => { 
                if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
                if (watchRef.current) navigator.geolocation.clearWatch(watchRef.current);
                
                const finalDistance = runDataRef.current.distance;
                const now = Date.now();
                let elapsedMs = isPausedRef.current ? 
                    (runDataRef.current.pauseStartTime - runDataRef.current.startTime - runDataRef.current.totalPausedTime) : 
                    (now - runDataRef.current.startTime - runDataRef.current.totalPausedTime);
                
                const finalElapsed = Math.max(0, Math.floor(elapsedMs / 1000));
                const finalDistanceKm = finalDistance / 1000;
                const paceString = formatPace(finalElapsed, finalDistance);

                if (finalDistance > 5) { 
                    const runName = prompt("Session complete! Enter a name for this run:", `Run ${new Date().toLocaleDateString()}`);
                    const summary = { 
                        id: Date.now(), 
                        name: runName || "Morning Session",
                        timestamp: Date.now(), 
                        duration: finalElapsed, 
                        distance: finalDistance, 
                        pace: paceString 
                    };
                    
                    setLastSummary(summary);
                    
                    const updatedRuns = [summary, ...runs];
                    setRuns(updatedRuns);
                    localStorage.setItem('runo_history', JSON.stringify(updatedRuns));

                    const updatedUser = { 
                        ...userData, 
                        streak: (userData?.streak || 0) + 1, 
                        totalKm: (userData?.totalKm || 0) + finalDistanceKm 
                    };
                    setUserData(updatedUser);
                    localStorage.setItem('runo_user', JSON.stringify(updatedUser));
                } else {
                    setLastSummary({ distance: 0, duration: 0, pace: "0:00" });
                }
                
                setIsRunning(false);
            };

            const togglePause = () => {
                if (!isPaused) {
                    setIsPaused(true);
                    runDataRef.current.pauseStartTime = Date.now();
                    runDataRef.current.speed = 0;
                    gpsEngineRef.current.pause(); 
                } else {
                    setIsPaused(false);
                    setAutoPaused(false);
                    runDataRef.current.totalPausedTime += (Date.now() - runDataRef.current.pauseStartTime);
                }
            };

            // Formatting Functions
            const formatPace = (totalSeconds, distanceMeters) => {
                if (distanceMeters < 10 || totalSeconds === 0) return "0:00";
                const pace = totalSeconds / (distanceMeters / 1000);
                if (pace > 3599) return "59:59"; 
                return `${Math.floor(pace / 60)}:${Math.floor(pace % 60).toString().padStart(2, '0')}`;
            };

            const formatTime = (totalSeconds) => {
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                return `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            // AI Functions
            const fetchBriefing = async () => {
                setIsBriefingLoading(true);
                const res = await callGemini(`User streak: ${userData.streak} days. Total: ${userData.totalKm.toFixed(1)}km. Generate a 2-sentence elite tactical morning briefing.`);
                setAiBriefing(res || "Focus on consistency today. Your momentum is your greatest asset.");
                setIsBriefingLoading(false);
            };

            const fetchWorkout = async (v) => {
                setIsWorkoutLoading(true);
                const res = await callGemini(`Feeling: ${v}. Generate a 10-minute circuit with 4 bodyweight exercises.`);
                setAiWorkout(res || "1. Jump Squats\n2. Narrow Pushups\n3. Mountain Climbers\n4. High Plank");
                setIsWorkoutLoading(false);
            };

            const fetchAnalysis = async () => {
                setIsAnalysisLoading(true);
                const res = await callGemini(`Analyze run: ${(lastSummary.distance/1000).toFixed(2)}km in ${Math.floor(lastSummary.duration/60)}m. Provide 1 tactical insight and 1 recovery tip.`);
                setAiAnalysis(res || "Session validated. Excellent pacing. Prioritize myofascial release and protein intake for recovery.");
                setIsAnalysisLoading(false);
            };

            // --- SCREENS ---

            const Splash = () => (
                <div className="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center animate__animated animate__fadeIn z-[200] w-full h-full">
                    <div className="w-24 h-24 bg-blue-600 rounded-[2rem] rotate-45 flex items-center justify-center shadow-[4px_6px_0px_#0f172a] border-2 border-slate-900 animate__animated animate__zoomIn">
                        <Icon name="Activity" size={48} color="white" className="-rotate-45" />
                    </div>
                </div>
            );

            const Onboarding = () => { // Google Sign In Logic Implementation
                const handleLogin = () => {
                    const newUser = { name: "Athlete", streak: 0, totalKm: 0, shields: 1, joined: Date.now(), profilePic: null };
                    setUserData(newUser); 
                    try { localStorage.setItem('runo_user', JSON.stringify(newUser)); } catch (e) {}
                    setView('home'); 
                };

                return (
                    <div className="absolute inset-0 bg-slate-900 text-white p-8 flex flex-col justify-center items-center text-center z-[150] animate__animated animate__fadeIn w-full h-full">
                        <div className="w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-[4px_6px_0px_#0f172a] border-2 border-slate-900">
                            <Icon name="User" size={48} color="white" />
                        </div>
                        <h1 className="text-6xl font-black tracking-tighter mb-4 animate__animated animate__fadeInUp">Welcome.</h1>
                        <p className="text-slate-300 mb-12 uppercase tracking-widest text-xs font-bold leading-relaxed">Your fitness journey<br/>begins now.</p>
                        
                        {/* Fake Non-workable Google Button (Medium Premium Styled) */}
                        <div className="w-full max-w-[320px] space-y-4">
                            <button 
                                onClick={handleLogin}
                                className="w-full py-4 bg-white text-slate-900 rounded-2xl font-bold text-sm fitness-card active:scale-95 transition-all flex items-center justify-center gap-3 border-2 border-slate-900 shadow-[4px_6px_0px_#0f172a]"
                            >
                                <svg width="20" height="20" viewBox="0 0 24 24">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                </svg>
                                <span>Sign in with Google</span>
                            </button>

                            <div className="flex items-center gap-4 py-2">
                                <div className="h-[1px] flex-1 bg-slate-700"></div>
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">OR</span>
                                <div className="h-[1px] flex-1 bg-slate-700"></div>
                            </div>

                            <button 
                                onClick={handleLogin} 
                                className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg fitness-card active:scale-95 transition-all uppercase tracking-tight"
                            >
                                GET STARTED
                            </button>
                        </div>
                    </div>
                );
            };

            const Home = () => (
                <div className="absolute inset-0 px-6 pt-6 overflow-y-auto custom-scroll animate__animated animate__fadeIn w-full h-full">
                    <IndianClock />
                    <header className="flex justify-between items-center mb-8 mt-4">
                        <div>
                            <p className="text-xs font-bold uppercase tracking-widest text-slate-500">Runo Fitness</p>
                            <h1 className="text-4xl font-black tracking-tighter text-slate-900">Good Morning.</h1>
                        </div>
                        <div className="bg-white px-5 py-2.5 rounded-full font-bold flex items-center gap-2 fitness-card text-slate-900">
                            <Icon name="Flame" size={20} color="#ea580c" /> {userData?.streak || 0}
                        </div>
                    </header>

                    {/* AI Briefing Card */}
                    <div className="mb-8 p-6 bg-white rounded-[2rem] fitness-card relative overflow-hidden">
                        <div className="flex justify-between items-center mb-3 relative z-10">
                            <p className="text-[10px] font-black uppercase tracking-widest text-blue-600 flex items-center gap-1">
                                <Icon name="Zap" size={14} color="#2563eb" /> AI Coach
                            </p>
                            <button onClick={fetchBriefing} disabled={isBriefingLoading} className="p-2 bg-slate-100 rounded-full active:scale-95 transition-transform border border-slate-300">
                                {isBriefingLoading ? <Icon name="Loader2" className="animate-spin text-slate-900" size={14}/> : <Icon name="RefreshCcw" size={14} color="#0f172a"/>}
                            </button>
                        </div>
                        <div className="relative z-10 min-h-[40px]">
                            {aiBriefing ? (
                                <p className="text-sm font-semibold leading-relaxed text-slate-800 animate__animated animate__fadeIn">{aiBriefing}</p>
                            ) : (
                                <p className="text-sm text-slate-400 italic font-medium mt-1">Tap refresh to sync your daily tactical protocol.</p>
                            )}
                        </div>
                    </div>

                    {/* VIBRANT Blue Target Card with CHANGED: Realistic Water Layers & Premium Dark White Border */}
                    <div className="relative bg-blue-600 rounded-[2.5rem] p-8 text-white mb-8 fitness-card premium-mission-border overflow-hidden">
                        {/* High Quality Real-Motion Water Background Layers */}
                        <div className="water-container">
                            <div className="water-wave"></div>
                            <div className="water-wave-secondary"></div>
                            <div className="water-wave-tertiary"></div>
                        </div>

                        <div className="relative z-10">
                            <div className="flex items-center gap-2 mb-4">
                                <div className="w-3 h-3 bg-white rounded-full animate-pulse"></div>
                                <p className="text-xs font-black uppercase tracking-widest text-blue-100">Today's Mission</p>
                            </div>
                            <h2 className="text-7xl font-black tracking-tighter mb-8 text-white drop-shadow-[0_4px_8px_rgba(0,0,0,0.2)]">2.5 <span className="text-3xl font-bold opacity-80">KM</span></h2>
                            <button onClick={() => { setView('run'); startRun(); }} className="w-full py-5 bg-slate-900 text-white rounded-xl font-black text-lg border-2 border-slate-900 shadow-[4px_6px_0px_#0f172a] active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all uppercase tracking-widest">
                                START RUN
                            </button>
                        </div>
                        <Icon name="Navigation" size={200} color="rgba(255,255,255,0.1)" className="absolute -right-5 -bottom-5 pointer-events-none" />
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="p-6 bg-slate-900 rounded-[2rem] fitness-card">
                            <Icon name="TrendingUp" size={32} color="#60a5fa" className="mb-4" />
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Distance</p>
                            <p className="text-3xl font-black tracking-tighter text-white">{(userData?.totalKm || 0).toFixed(1)} <span className="text-sm text-slate-500">KM</span></p>
                        </div>
                        <div className="p-6 bg-purple-600 rounded-[2rem] fitness-card">
                            <Icon name="Shield" size={32} color="#e9d5ff" className="mb-4" />
                            <p className="text-[10px] font-black text-purple-200 uppercase tracking-widest mb-1">Streak Shields</p>
                            <p className="text-3xl font-black tracking-tighter text-white">{userData?.shields || 1}</p>
                        </div>
                    </div>
                </div>
            );

            const Stats = () => { 
                return (
                    <div className="absolute inset-0 px-6 pt-6 overflow-y-auto custom-scroll animate__animated animate__fadeIn w-full h-full pb-32">
                        <IndianClock />
                        <header className="mb-8 mt-4">
                            <p className="text-xs font-black uppercase tracking-widest text-slate-500">AI Personal Training & Stats</p>
                            <h1 className="text-4xl font-black tracking-tighter text-slate-900">Analytics.</h1>
                        </header>

                        {/* AI Coach Card */}
                        <div className="p-8 bg-slate-900 text-white rounded-[2.5rem] fitness-card mb-8 relative overflow-hidden">
                            <div className="relative z-10">
                                <p className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-6">AI Coach: How's your body feeling?</p>
                                <div className="grid grid-cols-2 gap-3 mb-8">
                                    {["High Energy", "Sore Legs", "Need Recovery", "Short on Time"].map(v => (
                                        <button 
                                            key={v} 
                                            onClick={() => setVibe(v)} 
                                            className={`py-4 px-2 rounded-2xl text-[10px] font-black uppercase tracking-wider border-2 transition-all ${vibe === v ? 'bg-white text-slate-900 border-white shadow-[2px_3px_0px_#3b82f6]' : 'border-slate-700 text-slate-300 hover:border-slate-500'}`}
                                        >
                                            {v}
                                        </button>
                                    ))}
                                </div>
                                <button 
                                    onClick={() => fetchWorkout(vibe)} 
                                    disabled={!vibe || isWorkoutLoading} 
                                    className="w-full py-5 bg-blue-600 text-white rounded-xl font-black text-sm border-2 border-dark shadow-[4px_6px_0px_#0f172a] flex justify-center items-center gap-2 uppercase tracking-widest disabled:opacity-50 active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a]"
                                >
                                    {isWorkoutLoading ? <Icon name="Loader2" className="animate-spin text-white" size={20}/> : <><Icon name="Zap" size={18} color="white"/> Generate Circuit</>}
                                </button>
                            </div>
                            <Icon name="Zap" size={200} color="rgba(255,255,255,0.03)" className="absolute -right-10 top-0 pointer-events-none" />
                        </div>

                        {aiWorkout && (
                            <div className="p-8 bg-white border-2 border-slate-900 rounded-[2.5rem] shadow-[4px_6px_0px_#0f172a] mb-8 animate__animated animate__fadeInUp">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center border border-slate-900 shadow-[2px_2px_0px_#0f172a]">
                                        <Icon name="Flame" size={20} color="#ea580c"/>
                                    </div>
                                    <h4 className="font-black text-xl text-slate-900">Custom Protocol</h4>
                                </div>
                                <pre className="whitespace-pre-wrap font-sans text-sm font-medium leading-relaxed text-slate-700">{aiWorkout}</pre>
                            </div>
                        )}

                        <div className="p-8 bg-white rounded-[2.5rem] fitness-card mb-8">
                            <h3 className="font-black text-xl mb-8 uppercase text-slate-900">Activity Graph</h3>
                            <div className="flex justify-between items-end h-40 px-2 gap-3">
                                {[40, 70, 45, 90, 60, 30, 80].map((h, i) => (
                                    <div key={i} className="flex-1 flex flex-col items-center gap-3">
                                        <div className="w-full bg-slate-800 rounded-t-md relative overflow-hidden" style={{ height: `${h}%` }}>
                                            {i === 3 && <div className="absolute inset-0 bg-blue-500"></div>}
                                        </div>
                                        <span className="text-[10px] font-black text-slate-400">{"MTWTFSS"[i]}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="mb-8">
                            <h3 className="font-black text-xl mb-6 uppercase text-slate-900 flex items-center gap-2">
                                <Icon name="BarChart2" size={20} color="#0f172a"/> Recent Activity
                            </h3>
                            <div className="space-y-4">
                                {runs.length > 0 ? runs.slice(0, 5).map(run => (
                                    <div key={run.id} className="p-6 bg-white rounded-[2rem] border-2 border-slate-900 shadow-[4px_4px_0px_#0f172a] flex justify-between items-center">
                                        <div>
                                            <p className="font-black text-slate-900 uppercase text-sm tracking-tight">{run.name}</p>
                                            <div className="flex items-center gap-2 mt-1">
                                                <Icon name="Calendar" size={12} color="#64748b"/>
                                                <span className="text-[10px] font-bold text-slate-500 uppercase">{new Date(run.timestamp).toLocaleDateString()}</span>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-black text-blue-600 text-lg leading-none">
                                                {run.distance < 1000 ? `${Math.floor(run.distance)}m` : `${(run.distance / 1000).toFixed(2)}km`}
                                            </p>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mt-1">{run.pace}/km</p>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="p-8 text-center bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-300">
                                        <p className="text-slate-400 font-bold text-sm">No recorded missions yet.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const Run = () => { 
                const missionGoalMeters = 2500; // 2.5km goal from Home screen
                const displayDistance = distance < 1000 ? Math.floor(distance) : (distance / 1000).toFixed(2);
                const displayUnit = distance < 1000 ? "m" : "km";
                const progressPercent = Math.min(100, (distance / missionGoalMeters) * 100);

                // GPS Dot Logic
                const getGpsDotColor = () => {
                    if (gpsStatus === "ERROR") return "bg-red-500";
                    if (gpsStatus === "POOR SIGNAL" || gpsStatus === "LOCKING...") return "bg-orange-400";
                    if (gpsStatus === "WAITING") return "bg-slate-500";
                    return "bg-neonCyan";
                };

                // Post-Run Summary View
                if (lastSummary && !isRunning) {
                    return (
                        <div className="absolute inset-0 z-[60] bg-slate-100 text-slate-900 p-8 flex flex-col justify-between overflow-hidden animate__animated animate__fadeIn w-full h-full">
                            <div className="flex-1 overflow-y-auto custom-scroll pb-10">
                                <header className="flex justify-between items-center mb-12 pt-4">
                                    <h2 className="text-5xl font-black tracking-tighter">Session <br/><span className="text-blue-600">Complete.</span></h2>
                                </header>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="p-6 bg-slate-900 text-white rounded-[2rem] fitness-card">
                                        <p className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-widest">Total Distance</p>
                                        <p className="text-4xl font-black tracking-tighter">
                                            {lastSummary.distance < 1000 ? `${Math.floor(lastSummary.distance)}m` : `${(lastSummary.distance/1000).toFixed(2)}km`}
                                        </p>
                                    </div>
                                    <div className="p-6 bg-blue-50 rounded-[2rem] fitness-card">
                                        <p className="text-[10px] font-black text-blue-600 uppercase mb-2 tracking-widest">Total Time</p>
                                        <p className="text-4xl font-black tracking-tighter text-blue-900">{formatTime(lastSummary.duration)}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="p-6 bg-white rounded-[2.5rem] fitness-card">
                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Avg Pace</p>
                                        <p className="text-2xl font-black text-slate-900">{lastSummary.pace}<span className="text-xs text-slate-500">/km</span></p>
                                    </div>
                                    <div className="p-6 bg-white rounded-[2.5rem] fitness-card">
                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Calories</p>
                                        <p className="text-2xl font-black text-slate-900">~{Math.floor((lastSummary.distance/1000) * 75 * 1.036)}<span className="text-xs text-slate-500">kcal</span></p>
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <button 
                                        onClick={fetchAnalysis} 
                                        disabled={isAnalysisLoading} 
                                        className="w-full py-5 bg-purple-600 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest fitness-card flex justify-center items-center gap-2 mb-4 disabled:opacity-70 active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all"
                                    >
                                        {isAnalysisLoading ? <Icon name="Loader2" className="animate-spin text-white" size={20}/> : <><Icon name="Activity" size={20} color="white"/> Analyze Performance</>}
                                    </button>

                                    {aiAnalysis && (
                                        <div className="p-6 bg-purple-50 border-2 border-slate-900 shadow-[4px_6px_0px_#0f172a] rounded-[2rem] animate__animated animate__fadeInUp">
                                            <p className="text-[10px] font-black text-purple-600 uppercase tracking-widest mb-2 flex items-center gap-1"><Icon name="Zap" size={14} color="#9333ea"/> Coach Insight</p>
                                            <p className="text-sm font-semibold text-purple-900 leading-relaxed">{aiAnalysis}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="pb-8 pt-4">
                                <button onClick={() => setView('home')} className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-xl fitness-card uppercase tracking-widest active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all">RETURN HOME</button>
                            </div>
                        </div>
                    );
                }

                // Active Running Screen View
                return (
                    <div className={`absolute inset-0 z-[60] bg-slate-950 text-white flex flex-col justify-between animate__animated animate__slideInUp overflow-hidden overscroll-none w-full h-full transition-all duration-700 ${isPaused ? 'brightness-50' : 'brightness-100'}`}>
                        {/* Background Layer */}
                        <div className="absolute inset-0 bg-grid opacity-20 pointer-events-none"></div>
                        <div className="absolute inset-0 running-bg-glow pointer-events-none"></div>

                        {/* Modern GPS Status Top Bar */}
                        <header className="relative flex justify-between items-center z-10 p-8 pt-12">
                            <div className="flex items-center gap-2 bg-white/5 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                                <div className={`w-2 h-2 rounded-full ${getGpsDotColor()} ${gpsStatus === 'RECORDING' ? '' : 'gps-pulse shadow-[0_0_8px_#22d3ee]'}`} />
                                <span className="text-[9px] font-black uppercase tracking-[0.2em] text-white/70">
                                    {gpsStatus === "RECORDING" ? "GPS ACTIVE" : gpsStatus}
                                </span>
                            </div>
                            
                            <div className="bg-white/5 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                                <p className="text-[9px] font-black text-neonCyan uppercase tracking-widest">
                                    ELITE SENSORS
                                </p>
                            </div>
                        </header>
                        
                        {/* Hero Center Display */}
                        <div className="relative flex-1 flex flex-col items-center justify-center w-full px-4 mb-4">
                            {/* breathing / Pulse Circular Progress Ring */}
                            <div className="relative flex items-center justify-center">
                                <svg className="absolute w-[300px] h-[300px] sm:w-[340px] sm:h-[340px] -rotate-90 pointer-events-none">
                                    {/* Track Ring */}
                                    <circle cx="50%" cy="50%" r="135" stroke="rgba(255,255,255,0.03)" strokeWidth="12" fill="transparent" />
                                    {/* Active Ring */}
                                    <circle 
                                        cx="50%" 
                                        cy="50%" 
                                        r="135" 
                                        stroke="#22d3ee" 
                                        strokeWidth="12" 
                                        fill="transparent" 
                                        strokeDasharray={2 * Math.PI * 135} 
                                        style={{ 
                                            strokeDashoffset: 2 * Math.PI * 135 - (progressPercent / 100) * (2 * Math.PI * 135),
                                            filter: 'drop-shadow(0 0 8px rgba(34, 211, 238, 0.4))'
                                        }} 
                                        strokeLinecap="round" 
                                        className={`transition-all duration-1000 ease-out ${!isPaused ? 'breathing-pulse' : ''}`} 
                                    />
                                </svg>

                                <div className="z-10 text-center animate__animated animate__zoomIn">
                                    <h1 className="text-[90px] sm:text-[110px] font-black leading-none tracking-tighter tabular-nums text-white hero-distance-glow number-pop">
                                        {displayDistance}
                                    </h1>
                                    <p className="text-xl font-black text-neonCyan/60 uppercase tracking-[0.5em] mt-2 translate-x-1">
                                        {displayUnit}
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Glassmorphic Metrics Row */}
                        <div className="px-6 mb-8 w-full max-w-lg mx-auto z-10">
                            <div className="grid grid-cols-3 gap-3">
                                {/* Time Card */}
                                <div className="glass-metric p-4 rounded-3xl text-center relative overflow-hidden group">
                                    <div className="flex justify-center mb-2">
                                        <Icon name="Timer" size={16} color="#94a3b8" />
                                    </div>
                                    <p className="text-slate-400 text-[8px] font-black uppercase tracking-widest mb-1">Time</p>
                                    <p className="text-lg font-black text-white tabular-nums">{formatTime(elapsed)}</p>
                                </div>

                                {/* Pace Card */}
                                <div className="glass-metric p-4 rounded-3xl text-center">
                                    <div className="flex justify-center mb-2">
                                        <Icon name="Wind" size={16} color="#94a3b8" />
                                    </div>
                                    <p className="text-slate-400 text-[8px] font-black uppercase tracking-widest mb-1">Pace</p>
                                    <p className="text-lg font-black text-white tabular-nums">{formatPace(elapsed, distance)}</p>
                                </div>

                                {/* Speed Card */}
                                <div className="glass-metric p-4 rounded-3xl text-center">
                                    <div className="flex justify-center mb-2">
                                        <Icon name="TrendingUp" size={16} color="#94a3b8" />
                                    </div>
                                    <p className="text-slate-400 text-[8px] font-black uppercase tracking-widest mb-1">Speed</p>
                                    <p className="text-lg font-black text-white tabular-nums">{currentSpeed > 0 ? currentSpeed.toFixed(1) : "0.0"}</p>
                                </div>
                            </div>
                        </div>

                        {/* Control Area */}
                        <div className="relative w-full flex flex-col items-center gap-8 p-8 pb-16 z-20">
                            <div className="flex items-center gap-8">
                                {/* Pause Button */}
                                <button 
                                    onClick={togglePause} 
                                    className="control-button-pause w-20 h-20 rounded-full flex items-center justify-center active:scale-90 transition-all duration-200"
                                >
                                    {isPaused ? <Icon name="Play" size={28} color="white"/> : <Icon name="Pause" size={28} color="white"/>}
                                </button>

                                {/* Stop Button */}
                                <button 
                                    onClick={stopRun} 
                                    className="control-button-stop w-28 h-28 rounded-full flex items-center justify-center border-4 border-white/10 active:scale-95 transition-all duration-300 group"
                                >
                                    <div className="bg-white/10 p-4 rounded-full group-active:scale-75 transition-transform">
                                        <Icon name="Square" size={32} color="white" />
                                    </div>
                                </button>
                            </div>
                            
                            {/* Helpful Tip or State */}
                            <p className="text-[10px] font-black text-white/30 uppercase tracking-[0.3em] h-4">
                                {isPaused ? "SESSION PAUSED" : (distance > missionGoalMeters ? "MISSION ACCOMPLISHED" : "KEEP PUSHING")}
                            </p>
                        </div>

                        {/* Paused Blur Overlay */}
                        {isPaused && (
                            <div className="absolute inset-0 z-50 pointer-events-none flex items-center justify-center">
                                <div className="text-center animate__animated animate__fadeIn">
                                    <div className="bg-white/10 backdrop-blur-md px-8 py-4 rounded-full border border-white/20">
                                        <h3 className="text-2xl font-black uppercase tracking-widest text-white">Paused</h3>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const Profile = () => (
                <div className="absolute inset-0 px-8 pt-6 overflow-y-auto custom-scroll animate__animated animate__fadeIn w-full h-full">
                    <IndianClock />
                    <div className="flex flex-col items-center mb-10 mt-8">
                        <label className="relative block w-36 h-36 rounded-[2.5rem] bg-white flex items-center justify-center mb-6 fitness-card cursor-pointer overflow-hidden profile-pic-container">
                            {userData?.profilePic ? (
                                <img src={userData.profilePic} alt="Profile" className="w-full h-full object-cover" />
                            ) : (
                                <Icon name="User" size={60} color="#cbd5e1" />
                            )}
                            <div className="absolute inset-0 bg-slate-900/60 flex items-center justify-center upload-overlay">
                                <Icon name="Camera" size={32} color="white" />
                            </div>
                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                        </label>

                        <h2 className="text-4xl font-black tracking-tighter text-slate-900 mb-1 uppercase">{userData?.name || 'Athlete'}</h2>
                        <div className="bg-slate-900 text-blue-400 px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mt-2 border border-slate-700">Premium Account</div>
                    </div>
                    
                    <div className="space-y-5">
                        <div onClick={() => setView('privacy')} className="p-8 bg-white rounded-[2rem] flex justify-between items-center cursor-pointer fitness-card active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center">
                                    <Icon name="Shield" size={24} color="#3b82f6" />
                                </div>
                                <div>
                                    <p className="font-black text-lg uppercase text-slate-900">Data Policy</p>
                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Privacy Controls</p>
                                </div>
                            </div>
                            <Icon name="ChevronRight" size={24} color="#0f172a" />
                        </div>
                        
                        <a href="mailto:farmanshafi2007@gmail.com?subject=Runo Elite Support Request" className="p-8 bg-red-500 text-white rounded-[2rem] flex justify-between items-center cursor-pointer fitness-card active:translate-y-1 active:shadow-[2px_3px_0px_#0f172a] transition-all block no-underline">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-red-700 rounded-xl flex items-center justify-center border border-red-400">
                                    <Icon name="MessageSquare" size={24} color="white" />
                                </div>
                                <div>
                                    <p className="font-black text-lg uppercase text-white">Support</p>
                                    <p className="text-[10px] font-bold text-red-200 uppercase tracking-widest">Submit a Complaint</p>
                                </div>
                            </div>
                            <Icon name="ChevronRight" size={24} color="white" />
                        </a>

                        {/* CHANGED: Text updated to Logout */}
                        <div onClick={() => { if(confirm("Are you sure? This will log you out and clear local history.")) { localStorage.clear(); location.reload(); }}} className="p-8 bg-white rounded-[2rem] flex justify-between items-center fitness-card active:translate-y-1">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center border border-slate-200">
                                    <Icon name="Settings" size={24} color="#64748b" />
                                </div>
                                <p className="font-black text-lg text-gray-600 uppercase">Logout</p>
                            </div>
                            <Icon name="RefreshCcw" size={20} color="#94a3b8" />
                        </div>
                    </div>
                </div>
            );

            const Privacy = () => (
                <div className="fixed inset-0 z-[100] bg-slate-900 text-white flex flex-col animate__animated animate__slideInRight w-full h-full">
                    <header className="px-8 pt-16 pb-8 border-b border-slate-800 bg-slate-900 flex items-center justify-between sticky top-0 z-10">
                        <button onClick={() => setView('profile')} className="p-4 bg-slate-800 rounded-2xl active:scale-95 transition-transform border border-slate-700"><Icon name="ChevronLeft" size={24} color="white"/></button>
                        <h2 className="text-xl font-black tracking-tighter uppercase text-blue-400">Privacy</h2>
                        <div className="w-14"></div>
                    </header>
                    <div className="flex-1 overflow-y-auto p-10 custom-scroll space-y-10 pb-[100px]">
                        <h3 className="text-4xl font-black tracking-tighter leading-tight text-white">Data Handling Protocol.</h3>
                        
                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-blue-400 uppercase tracking-widest">01. Telemetry</h4>
                            <p className="text-slate-400 leading-relaxed text-sm font-medium">We collect fitness telemetry (GPS paths) only while a run is actively recording. This data is kept strictly local to your device.</p>
                        </div>
                        
                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-blue-400 uppercase tracking-widest">02. Analytics</h4>
                            <p className="text-slate-400 leading-relaxed text-sm font-medium">Your workout history and profile image are securely stored locally in your browser storage to provide you with lifetime stats and streak tracking.</p>
                        </div>

                        <div className="space-y-4">
                            <h4 className="font-black text-lg text-blue-400 uppercase tracking-widest">03. Support</h4>
                            <p className="text-slate-400 leading-relaxed text-sm font-medium">If you need your data cleared, simply clear your browser data or reinstall the app. Contact protocol: farmanshafi2007@gmail.com.</p>
                        </div>
                    </div>
                </div>
            );

            // Nav Configuration
            const navItems = [
                { id: 'home', icon: 'HomeSolid', label: 'HOME' }, 
                { id: 'stats', icon: 'BarChart2', label: 'STATS' }, 
                { id: 'profile', icon: 'User', label: 'PROFILE' } 
            ];

            return (
                <div className="fixed inset-0 w-full h-full bg-slate-100 overflow-hidden">
                    {view === 'splash' && Splash()}
                    {view === 'home' && Home()}
                    {view === 'stats' && Stats()}
                    {view === 'run' && Run()}
                    {view === 'profile' && Profile()}
                    {view === 'privacy' && Privacy()}
                    {view === 'onboarding' && Onboarding()}

                    {/* FIXED BOTTOM NAVIGATION */}
                    {['home', 'profile', 'stats'].includes(view) && (
                        <div className="nav-dock-container pointer-events-none">
                            <nav className="nav-pill pointer-events-auto mx-auto w-[85%] max-w-[350px]">
                                {navItems.map((item) => {
                                    const isActive = view === item.id;
                                    return (
                                        <button 
                                            key={item.id}
                                            onClick={() => setView(item.id)} 
                                            className={`nav-item ${isActive ? 'active' : 'hover:bg-slate-50'}`}
                                        >
                                            <Icon name={item.icon} size={24} color={isActive ? 'white' : '#64748b'} />
                                            {isActive && <span className="text-[9px] font-black mt-1 text-white">{item.label}</span>}
                                        </button>
                                    );
                                })}
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
