<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Runo Elite | High-Performance Fitness</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons and Animations -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scroll {
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .custom-scroll::-webkit-scrollbar { display: none; }

        .noir-glow { box-shadow: 0 0 60px rgba(255, 255, 255, 0.06); }
        .text-glow { text-shadow: 0 0 25px rgba(255, 255, 255, 0.3); }

        .nav-dock {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .ai-card {
            background: linear-gradient(145deg, #0a0a0a 0%, #000000 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-elite:active { transform: scale(0.96); }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-glow { animation: pulse-glow 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- GEMINI API INTEGRATION ---
        const apiKey = ""; 
        const callGemini = async (prompt, systemPrompt = "You are Runo Elite AI, a high-performance fitness coach. Keep responses short, tactical, and motivational.") => {
            let retries = 0;
            while (retries < 3) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    retries++;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        };

        // Ultra-Defensive Icon Component
        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    try {
                        const iconData = window.lucide.icons[name];
                        if (iconData && Array.isArray(iconData[1])) {
                            ref.current.innerHTML = '';
                            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                            svg.setAttribute("width", size);
                            svg.setAttribute("height", size);
                            svg.setAttribute("viewBox", "0 0 24 24");
                            svg.setAttribute("fill", "none");
                            svg.setAttribute("stroke", "currentColor");
                            svg.setAttribute("stroke-width", "2");
                            svg.setAttribute("stroke-linecap", "round");
                            svg.setAttribute("stroke-linejoin", "round");
                            svg.classList.add(...className.split(' ').filter(Boolean));
                            iconData[1].forEach(tag => {
                                const el = document.createElementNS("http://www.w3.org/2000/svg", tag[0]);
                                Object.entries(tag[1]).forEach(([k, v]) => el.setAttribute(k, v));
                                svg.appendChild(el);
                            });
                            ref.current.appendChild(svg);
                        }
                    } catch (err) {}
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        // Sensor Fusion Engine
        class KalmanFilter {
            constructor(q = 0.00001, r = 0.001, p = 1) {
                this.q = q; this.r = r; this.p = p; this.x = 0;
            }
            filter(val) {
                if (this.x === 0) { this.x = val; return val; }
                this.p = this.p + this.q;
                const k = this.p / (this.p + this.r);
                this.x = this.x + k * (val - this.x);
                this.p = (1 - k) * this.p;
                return this.x;
            }
        }

        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        function App() {
            const [view, setView] = useState('splash');
            const [userData, setUserData] = useState(null);
            const [runs, setRuns] = useState([]);
            
            // State
            const [aiBriefing, setAiBriefing] = useState(null);
            const [isBriefingLoading, setIsBriefingLoading] = useState(false);
            const [aiWorkout, setAiWorkout] = useState(null);
            const [isWorkoutLoading, setIsWorkoutLoading] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState(null);
            const [isAnalysisLoading, setIsAnalysisLoading] = useState(false);

            // Tracking
            const [isRunning, setIsRunning] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [elapsed, setElapsed] = useState(0);
            const [distance, setDistance] = useState(0);
            const [route, setRoute] = useState([]);
            const [accuracy, setAccuracy] = useState(0);
            const [lastSummary, setLastSummary] = useState(null);

            const timerRef = useRef(null);
            const watchRef = useRef(null);
            const lastPosRef = useRef(null);
            const latK = useRef(new KalmanFilter());
            const lngK = useRef(new KalmanFilter());

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (!userData) setView('onboarding');
                    else setView('home');
                }, 2000);
                return () => clearTimeout(timer);
            }, [userData]);

            const startRun = () => {
                setIsRunning(true); setIsPaused(false); setLastSummary(null);
                timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
                if (navigator.geolocation) {
                    watchRef.current = navigator.geolocation.watchPosition((p) => {
                        const { latitude, longitude, accuracy: acc } = p.coords;
                        setAccuracy(acc);
                        if (acc > 30) return;
                        const fLat = latK.current.filter(latitude);
                        const fLng = lngK.current.filter(longitude);
                        if (lastPosRef.current) {
                            const d = getDistance(lastPosRef.current.lat, lastPosRef.current.lng, fLat, fLng);
                            if (d > 0.8) {
                                setDistance(prev => prev + d);
                                setRoute(r => [...r, {x: 180 + (fLng - lastPosRef.current.lng)*600000, y: 180 - (fLat - lastPosRef.current.lat)*600000}]);
                            }
                        }
                        lastPosRef.current = {lat: fLat, lng: fLng};
                    }, null, {enableHighAccuracy: true});
                }
            };

            const stopRun = () => {
                clearInterval(timerRef.current);
                if (watchRef.current) navigator.geolocation.clearWatch(watchRef.current);
                const summary = { id: Date.now(), timestamp: Date.now(), duration: elapsed, distance, pace: distance > 10 ? elapsed / (distance/1000) : 0 };
                setLastSummary(summary);
                if (distance > 10) {
                    setRuns(prev => [summary, ...prev]);
                    setUserData(prev => ({ ...prev, streak: prev.streak + 1, totalKm: prev.totalKm + (distance/1000) }));
                }
                setIsRunning(false);
            };

            // AI Logic
            const fetchBriefing = async () => {
                setIsBriefingLoading(true);
                const res = await callGemini(`User streak: ${userData.streak}, Total: ${userData.totalKm.toFixed(1)}km. Generate a 2-sentence elite morning briefing.`);
                setAiBriefing(res || "Focus on consistency today. Your momentum is your greatest asset.");
                setIsBriefingLoading(false);
            };

            const fetchWorkout = async (v) => {
                setIsWorkoutLoading(true);
                const res = await callGemini(`Feeling: ${v}. Generate a 10-minute circuit with 4 bodyweight exercises.`);
                setAiWorkout(res || "1. Jump Squats\n2. Narrow Pushups\n3. Mountain Climbers\n4. High Plank");
                setIsWorkoutLoading(false);
            };

            const fetchAnalysis = async () => {
                setIsAnalysisLoading(true);
                const res = await callGemini(`Analyze run: ${(distance/1000).toFixed(2)}km in ${Math.floor(elapsed/60)}m. Provide 1 tactical insight.`);
                setAiAnalysis(res || "Session validated. Prioritize myofascial release for recovery.");
                setIsAnalysisLoading(false);
            };

            // --- Sub-Views ---

            const Splash = () => (
                <div className="h-screen bg-black flex flex-col items-center justify-center animate__animated animate__fadeIn">
                    <div className="w-20 h-20 bg-white rounded-[2rem] rotate-45 flex items-center justify-center animate__animated animate__zoomIn">
                        <Icon name="Navigation" size={40} className="text-black -rotate-45" />
                    </div>
                    <h1 className="text-white mt-12 font-black tracking-[0.6em] uppercase text-[10px]">Runo Elite</h1>
                </div>
            );

            const Onboarding = () => (
                <div className="h-screen bg-black text-white p-12 flex flex-col justify-center items-center text-center">
                    <h1 className="text-7xl font-black tracking-tighter mb-4 animate__animated animate__fadeInUp">Elite.</h1>
                    <p className="text-neutral-500 mb-20 uppercase tracking-[0.4em] text-[10px] font-bold">Precision Habit Protocol</p>
                    <button onClick={() => { setUserData({ name: "Athlete", streak: 0, totalKm: 0, shields: 1, joined: Date.now() }); setView('home'); }} className="w-full py-7 bg-white text-black rounded-[2.5rem] font-black text-xl active:scale-95 transition-all shadow-2xl">ESTABLISH</button>
                </div>
            );

            const Home = () => (
                <div className="h-full bg-white text-black px-6 pt-16 pb-32 overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                    <header className="flex justify-between items-center mb-10">
                        <div><p className="text-[10px] font-black uppercase tracking-[0.4em] text-neutral-400">Elite Command</p><h1 className="text-4xl font-black tracking-tighter">Own the Day.</h1></div>
                        <div className="bg-black text-white px-5 py-2.5 rounded-full font-bold flex items-center gap-2 shadow-xl">
                            <Icon name="Flame" size={18} className="text-orange-500 fill-orange-500" />{userData?.streak || 0}
                        </div>
                    </header>

                    <div className="mb-8 p-8 ai-card rounded-[3rem] border border-neutral-100 shadow-2xl">
                        <div className="flex justify-between items-center mb-5">
                            <p className="text-[10px] font-black uppercase tracking-widest text-neutral-500">✨ AI Briefing</p>
                            <button onClick={fetchBriefing} disabled={isBriefingLoading} className="p-2 bg-neutral-900 rounded-full">{isBriefingLoading ? <Icon name="Loader2" className="animate-spin text-white" size={12}/> : <Icon name="RefreshCcw" size={12} className="text-white"/>}</button>
                        </div>
                        {aiBriefing ? <p className="text-sm font-medium leading-relaxed text-white animate__animated animate__fadeIn">{aiBriefing}</p> : <p className="text-sm text-neutral-500 italic">Generate your daily tactical briefing.</p>}
                    </div>

                    <div className="relative bg-black rounded-[3.5rem] p-10 text-white mb-10 overflow-hidden shadow-2xl border border-white/5 noir-glow">
                        <div className="relative z-10">
                            <p className="text-[10px] font-bold uppercase tracking-widest text-neutral-500 mb-3">Today's Objective</p>
                            <h2 className="text-6xl font-black tracking-tighter mb-10">2.5 <span className="text-xl text-neutral-600 font-medium">KM</span></h2>
                            <button onClick={() => { setDistance(0); setElapsed(0); setLastSummary(null); setView('run'); }} className="w-full py-6 bg-white text-black rounded-[2rem] font-black text-lg btn-elite">START RUN</button>
                        </div>
                        <Icon name="Activity" size={340} className="absolute right-[-100px] bottom-[-100px] opacity-10 pointer-events-none" />
                    </div>

                    <h3 className="font-black text-xs uppercase tracking-widest text-neutral-300 mb-6 px-2">Recent Session</h3>
                    {runs.length > 0 ? (
                        <div className="p-7 bg-neutral-50 rounded-[2.5rem] flex items-center justify-between border border-neutral-100">
                            <div className="flex items-center gap-5">
                                <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm"><Icon name="Navigation" size={24} /></div>
                                <div><p className="text-2xl font-black tracking-tighter">{(runs[0].distance/1000).toFixed(2)} km</p><p className="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Validated</p></div>
                            </div>
                            <div className="text-right text-neutral-400 text-[10px] font-black uppercase">{(runs[0].duration/60).toFixed(0)} MINS</div>
                        </div>
                    ) : <div className="py-12 text-center border-2 border-dashed border-neutral-100 rounded-[3rem] text-neutral-300 text-[10px] font-bold uppercase">No data synced</div>}
                </div>
            );

            const Stats = () => (
                <div className="h-full bg-white text-black px-6 pt-16 pb-32 overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                    <header className="mb-12">
                        <p className="text-[10px] font-black uppercase tracking-[0.4em] text-neutral-400">Activity Analytics</p>
                        <h1 className="text-4xl font-black tracking-tighter">Metrics.</h1>
                    </header>
                    
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="p-8 bg-black text-white rounded-[3rem] shadow-2xl">
                            <Icon name="TrendingUp" className="mb-4 text-neutral-500" />
                            <p className="text-[10px] font-black uppercase tracking-widest text-neutral-500">Volume</p>
                            <p className="text-3xl font-black tracking-tighter">{(userData?.totalKm || 0).toFixed(1)} <span className="text-xs font-medium">KM</span></p>
                        </div>
                        <div className="p-8 bg-neutral-50 rounded-[3rem] border border-neutral-100">
                            <Icon name="Shield" className="mb-4" />
                            <p className="text-[10px] font-black uppercase tracking-widest text-neutral-400">Reserves</p>
                            <p className="text-3xl font-black tracking-tighter">{userData?.shields || 1}</p>
                        </div>
                    </div>

                    <div className="p-8 bg-neutral-50 rounded-[3.5rem] border border-neutral-100 mb-8">
                        <div className="flex justify-between items-end h-32 px-4 gap-2">
                            {[40, 70, 45, 90, 60, 30, 80].map((h, i) => (
                                <div key={i} className="flex-1 flex flex-col items-center gap-3">
                                    <div className="w-full bg-black rounded-t-xl transition-all duration-1000" style={{ height: `${h}%` }}></div>
                                    <span className="text-[9px] font-black text-neutral-300">MTWTFSS"[i]</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <h3 className="font-black text-xs uppercase tracking-widest text-neutral-300 mb-6 px-2">Accuracy Check</h3>
                    <div className="p-7 bg-white border border-neutral-100 rounded-[2.5rem] flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-green-50 rounded-xl"><Icon name="Zap" size={18} className="text-green-600" /></div>
                            <div><p className="font-black text-sm uppercase tracking-tight">Kalman Filter</p><p className="text-[10px] text-neutral-400 font-bold uppercase">Active & Calibrated</p></div>
                        </div>
                        <div className="w-12 h-6 bg-neutral-100 rounded-full p-1"><div className="w-4 h-4 bg-black rounded-full ml-auto"></div></div>
                    </div>
                </div>
            );

            const Coach = () => {
                const [v, setV] = useState("");
                return (
                    <div className="h-full bg-white text-black px-6 pt-16 pb-32 overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                        <header className="mb-10"><p className="text-[10px] font-black uppercase tracking-[0.4em] text-neutral-400">AI Personal Training</p><h1 className="text-4xl font-black tracking-tighter">Circuit.</h1></header>
                        <div className="p-8 bg-black text-white rounded-[3.5rem] shadow-2xl mb-8">
                            <p className="text-xs font-bold uppercase tracking-widest text-neutral-500 mb-6 text-center">Protocol Vibe</p>
                            <div className="grid grid-cols-2 gap-3 mb-8">
                                {["High Intensity", "Active Recovery", "Low Power", "Sore Legs"].map(vibe => (
                                    <button key={vibe} onClick={() => setV(vibe)} className={`py-4 rounded-2xl text-[10px] font-black uppercase border transition-all ${v === vibe ? 'bg-white text-black border-white' : 'border-neutral-800 text-neutral-400'}`}>{vibe}</button>
                                ))}
                            </div>
                            <button onClick={() => fetchWorkout(v)} disabled={!v || isWorkoutLoading} className="w-full py-5 bg-white text-black rounded-2xl font-black text-sm btn-elite flex justify-center items-center gap-2">
                                {isWorkoutLoading ? <Icon name="Loader2" className="animate-spin" size={16}/> : "✨ GENERATE"}
                            </button>
                        </div>
                        {aiWorkout && <div className="p-8 bg-neutral-50 rounded-[3rem] border border-neutral-100 animate__animated animate__fadeIn"><pre className="whitespace-pre-wrap font-sans text-sm leading-relaxed text-neutral-700">{aiWorkout}</pre></div>}
                    </div>
                );
            };

            const Run = () => {
                const circ = 2 * Math.PI * 140;
                const offset = circ - (Math.min(100, (distance / 5000) * 100) / 100) * circ;

                if (lastSummary && !isRunning) {
                    return (
                        <div className="fixed inset-0 z-[60] bg-white text-black p-8 flex flex-col justify-between overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                            <div>
                                <header className="flex justify-between items-center mb-12"><h2 className="text-4xl font-black tracking-tighter">Session.</h2><button onClick={() => setView('home')} className="p-3 bg-neutral-50 rounded-2xl"><Icon name="X" size={20}/></button></header>
                                <div className="grid grid-cols-2 gap-4 mb-10">
                                    <div className="p-8 bg-black text-white rounded-[3rem] shadow-xl"><p className="text-[10px] font-bold text-neutral-500 uppercase mb-1">Total</p><p className="text-4xl font-black tracking-tighter">{(distance/1000).toFixed(2)} km</p></div>
                                    <div className="p-8 bg-neutral-50 rounded-[3rem]"><p className="text-[10px] font-bold text-neutral-400 uppercase mb-1">Time</p><p className="text-4xl font-black tracking-tighter">{Math.floor(elapsed/60)}m</p></div>
                                </div>
                                <button onClick={fetchAnalysis} disabled={isAnalysisLoading} className="w-full py-6 bg-black text-white rounded-[2.5rem] font-bold flex items-center justify-center gap-2 mb-6 btn-elite">
                                    {isAnalysisLoading ? <Icon name="Loader2" className="animate-spin" size={20}/> : "✨ ANALYZE PERFORMANCE"}
                                </button>
                                {aiAnalysis && <div className="p-8 bg-neutral-50 border border-neutral-100 rounded-[3rem] animate__animated animate__fadeIn"><p className="text-[10px] font-black uppercase text-neutral-400 mb-4 tracking-widest">Coach Analysis</p><p className="text-sm font-medium leading-relaxed italic">"{aiAnalysis}"</p></div>}
                            </div>
                            <button onClick={() => setView('home')} className="w-full py-7 border border-neutral-100 rounded-[2.5rem] font-black text-xs uppercase tracking-[0.3em]">Return to Protocol</button>
                        </div>
                    );
                }

                return (
                    <div className="fixed inset-0 z-[60] bg-black text-white p-8 flex flex-col justify-between animate__animated animate__slideInUp">
                        <header className="flex justify-between items-center z-10">
                            <button onClick={() => !isRunning && setView('home')} className="text-neutral-700 font-black text-[10px] tracking-widest uppercase">{!isRunning ? "Cancel" : ""}</button>
                            <div className="flex items-center gap-3 bg-neutral-900 px-5 py-2.5 rounded-full border border-white/5">
                                <div className={`w-2 h-2 rounded-full ${isRunning && !isPaused ? 'bg-green-500 animate-pulse' : 'bg-orange-500'}`} />
                                <span className="text-[10px] font-black uppercase tracking-widest">{isRunning ? "Live Sensor" : "Ready"}</span>
                            </div>
                            <div className="text-[9px] font-black text-neutral-800 uppercase">GPS Accuracy: {accuracy.toFixed(0)}m</div>
                        </header>
                        <div className="relative flex-1 flex flex-col items-center justify-center">
                            <svg className="absolute w-[360px] h-[360px] -rotate-90">
                                <circle cx="180" cy="180" r="140" stroke="#111" strokeWidth="4" fill="transparent" />
                                <circle cx="180" cy="180" r="140" stroke="white" strokeWidth="10" fill="transparent" strokeDasharray={circ} style={{ strokeDashoffset: offset }} strokeLinecap="round" className="progress-ring-circle drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]" />
                            </svg>
                            <div className="z-10 text-center animate__animated animate__zoomIn">
                                <p className="text-neutral-600 text-[10px] font-black uppercase tracking-[0.6em] mb-4">Distance</p>
                                <h1 className="text-[120px] font-light leading-none tracking-tighter tabular-nums text-glow">{(distance / 1000).toFixed(2)}</h1>
                                <p className="text-xl font-black text-neutral-500 uppercase tracking-widest mt-2">Kilometers</p>
                            </div>
                        </div>
                        <div className="w-full flex justify-center items-center gap-10 mb-20 z-20">
                            {!isRunning ? (
                                <button onClick={startRun} className="w-32 h-32 bg-white text-black rounded-full flex items-center justify-center shadow-2xl btn-elite"><Icon name="Play" size={48} className="fill-black" /></button>
                            ) : (
                                <>
                                    <button onClick={() => setIsPaused(!isPaused)} className="w-20 h-20 border-2 border-neutral-800 rounded-full flex items-center justify-center active:scale-95 transition-all">{isPaused ? <Icon name="Play" size={28} /> : <Icon name="Pause" size={28} />}</button>
                                    <button onClick={stopRun} className="w-32 h-32 bg-red-600 rounded-full flex items-center justify-center shadow-2xl btn-elite"><Icon name="Square" size={40} className="fill-white" /></button>
                                </>
                            )}
                        </div>
                    </div>
                );
            };

            const Profile = () => (
                <div className="h-full bg-white text-black px-8 pt-20 pb-32 overflow-y-auto custom-scroll animate__animated animate__fadeIn">
                    <div className="flex flex-col items-center mb-12 animate__animated animate__zoomIn">
                        <div className="w-32 h-32 bg-neutral-50 rounded-full flex items-center justify-center mb-6 border border-neutral-100 shadow-inner"><Icon name="User" size={60} className="text-neutral-300" /></div>
                        <h2 className="text-4xl font-black tracking-tighter mb-1">Athlete.</h2>
                        <p className="text-[10px] font-black text-neutral-400 uppercase tracking-[0.4em]">Elite Status Validated</p>
                    </div>
                    <div className="space-y-4">
                        <div onClick={() => setView('privacy')} className="p-8 bg-black text-white rounded-[3rem] flex justify-between items-center cursor-pointer shadow-2xl btn-elite">
                            <div className="flex items-center gap-5"><div className="w-12 h-12 bg-neutral-900 rounded-2xl flex items-center justify-center border border-white/10"><Icon name="Shield" size={24} /></div><div><p className="font-black text-lg tracking-tight">Privacy & Security</p><p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest">End-to-End Encryption</p></div></div>
                            <Icon name="ChevronRight" size={20} className="text-neutral-600" />
                        </div>
                        <div className="p-8 border border-neutral-100 rounded-[3rem] flex justify-between items-center opacity-50">
                            <div className="flex items-center gap-5"><div className="w-12 h-12 bg-neutral-50 rounded-2xl flex items-center justify-center"><Icon name="Settings" size={24} /></div><p className="font-black text-lg tracking-tight">Protocol Settings</p></div>
                            <Icon name="Lock" size={18} className="text-neutral-300" />
                        </div>
                    </div>
                    <button onClick={() => location.reload()} className="w-full mt-16 text-center text-neutral-300 text-[10px] font-black uppercase tracking-[0.5em]">Reset Protocol</button>
                </div>
            );

            const Privacy = () => (
                <div className="fixed inset-0 z-[100] bg-white text-black flex flex-col animate__animated animate__slideInUp">
                    <header className="px-8 pt-16 pb-8 border-b border-neutral-100 bg-white flex items-center justify-between sticky top-0 z-10"><button onClick={() => setView('profile')} className="p-4 bg-neutral-50 rounded-2xl btn-elite"><Icon name="ChevronLeft" size={24}/></button><h2 className="text-2xl font-black tracking-tighter">Legal & Privacy</h2><div className="w-12"></div></header>
                    <div className="flex-1 overflow-y-auto p-12 custom-scroll space-y-12">
                        <div className="space-y-4"><p className="text-[10px] font-black uppercase tracking-widest text-neutral-400">Version 1.4 | April 2026</p><h3 className="text-4xl font-black tracking-tighter">Privacy is our core foundation.</h3></div>
                        {[
                            { id: "01", title: "Data Protocol", text: "We collect biometric and telemetry data purely to optimize measurement accuracy via our elite sensor fusion engine." },
                            { id: "02", title: "AI Integrity", text: "Training routines are generated via the Gemini API. Your session data is processed in real-time and remains local to your device." },
                            { id: "08", title: "Contact Security", text: "Direct channel: farmanshafi2007@gmail.com" }
                        ].map(s => (
                            <div key={s.id} className="space-y-4">
                                <div className="flex items-center gap-4"><span className="text-[10px] font-black text-neutral-200 uppercase">{s.id}</span><h4 className="font-black text-xl tracking-tight">{s.title}</h4></div>
                                <p className="text-neutral-500 leading-relaxed pl-8 text-sm">{s.text}</p>
                            </div>
                        ))}
                        <div className="h-32" />
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-full bg-white relative overflow-hidden">
                    {view === 'splash' && <Splash />}
                    {view === 'home' && <Home />}
                    {view === 'stats' && <Stats />}
                    {view === 'coach' && <Coach />}
                    {view === 'run' && <Run />}
                    {view === 'profile' && <Profile />}
                    {view === 'privacy' && <Privacy />}
                    {view === 'onboarding' && <Onboarding />}

                    {['home', 'profile', 'coach', 'stats'].includes(view) && (
                        <nav className="fixed bottom-0 inset-x-0 h-28 nav-dock flex items-center justify-around px-8 pb-8 z-50">
                            <button onClick={() => setView('home')} className={`p-4 transition-all ${view === 'home' ? 'text-black scale-125' : 'text-neutral-300'}`}><Icon name="Home" size={26}/></button>
                            <button onClick={() => setView('stats')} className={`p-4 transition-all ${view === 'stats' ? 'text-black scale-125' : 'text-neutral-300'}`}><Icon name="BarChart2" size={26}/></button>
                            <button onClick={() => setView('coach')} className={`p-4 transition-all ${view === 'coach' ? 'text-black scale-125' : 'text-neutral-300'}`}><Icon name="Zap" size={26}/></button>
                            <button onClick={() => setView('profile')} className={`p-4 transition-all ${view === 'profile' ? 'text-black scale-125' : 'text-neutral-300'}`}><Icon name="User" size={26}/></button>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
