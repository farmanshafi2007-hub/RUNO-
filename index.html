            padding: 0;

            width: 100%;
            overflow: hidden;
            position: fixed; /* Freezes the background */
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }

            height: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;

            transform: translate(2px, 3px);

            position: fixed;
            bottom: env(safe-area-inset-bottom, 24px);
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 100;

            border: 2.5px solid #0f172a;

            opacity: 0;
            transition: opacity 0.3s;
        }
        .profile-pic-container:hover .upload-overlay {
            opacity: 1;

        .water-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2563eb;
            overflow: hidden;
            z-index: 0;

            position: absolute;
            bottom: -110%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 43%;
            animation: wave-motion 8s infinite linear;
        }

        .water-wave-secondary {
            position: absolute;
            bottom: -112%;
            left: -55%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40%;
            animation: wave-motion 12s infinite linear;

            left: -45%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 45%;
            animation: wave-motion 16s infinite linear;

            0% { transform: rotate(0deg); }

        }

            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);

        // --- SENSOR FUSION ENGINE (Production-Level Real-Time Tracking) --- 
        class GPSEngine {
            constructor() {
                this.lastValidPoint = null;
                this.totalDistance = 0; // meters
                this.lastTime = 0;
                this.lowSpeedDuration = 0;
                this.consecutiveGoodAccuracyCount = 0;
                this.isLocked = false;
                this.stationaryCount = 0;
            }

            haversine(lat1, lon1, lat2, lon2) {
                const R = 6371e3; // Earth radius in meters
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            pause() {
                this.lastValidPoint = null;
                this.lowSpeedDuration = 0;
            }

            processPoint(rawPoint) {
                const { latitude, longitude, accuracy } = rawPoint.coords;
                const timestamp = rawPoint.timestamp || Date.now();

                // 1. Accuracy Filter (Accept positions <= 60m for starting, then tighten)
                if (accuracy > 60) return { status: 'LOW_ACCURACY', distance: this.totalDistance, accuracy };

                // 2. GPS Lock System (Wait for initial stability)
                if (!this.isLocked) {
                    if (accuracy <= 40) {
                        this.consecutiveGoodAccuracyCount++;
                        // Increased required consecutive pings to 3 to ensure stable start
                        if (this.consecutiveGoodAccuracyCount >= 3) { 
                            this.isLocked = true;
                            this.lastValidPoint = { lat: latitude, lng: longitude };
                            this.lastTime = timestamp;
                            return { status: 'LOCKED', distance: this.totalDistance, accuracy };
                        }
                    } else {
                        this.consecutiveGoodAccuracyCount = 0;
                    }
                    return { status: 'LOCKING', distance: this.totalDistance, accuracy };
                }

                // 3. Time Difference
                const dt = (timestamp - this.lastTime) / 1000; 
                if (dt <= 0) return { status: 'INVALID_TIME', distance: this.totalDistance, accuracy };

                // 4. Distance Calculation (Haversine)
                const dist = this.haversine(this.lastValidPoint.lat, this.lastValidPoint.lng, latitude, longitude);
                const speedMs = dist / dt;

                // --- CRITICAL GHOST DISTANCE FIX ---
                // Stricter initial lock: Ensure we don't start accumulating ghost points when stationary at the start.
                if (this.totalDistance === 0) {
                    // Require sustained movement or a significant distance to break out of "0" state.
                    // If we moved less than 5 meters OR speed is incredibly slow, just re-center.
                    if (dist < 5 || speedMs < 0.8) {
                        this.lastValidPoint = { lat: latitude, lng: longitude };
                        this.lastTime = timestamp;
                        return { status: 'REFINING', distance: this.totalDistance, accuracy, speed: 0 };
                    }
                }
                
                // Speed threshold: 0.4 m/s (approx 1.4 km/h) to avoid "GPS drift" while standing still
                if (speedMs < 0.4) {
                    this.stationaryCount++;
                    this.lowSpeedDuration += dt;
                    if (this.lowSpeedDuration >= 10) return { status: 'AUTO_PAUSED', distance: this.totalDistance, accuracy, speed: 0 };
                    return { status: 'STATIONARY', distance: this.totalDistance, accuracy };
                }

                this.stationaryCount = 0; // Reset stationary count since we are moving

                // Jump filter: Ignore speeds > 12 m/s (43 km/h) as it's likely a GPS glitch or driving
                if (speedMs > 12) return { status: 'JUMP', distance: this.totalDistance, accuracy };
                
                // 6. Valid Movement: Requires at least 2.5 meters of movement to prevent micro-drifts from adding up
                if (dist > 2.5) {
                    this.totalDistance += dist;
                    this.lastValidPoint = { lat: latitude, lng: longitude };
                    this.lastTime = timestamp;
                    this.lowSpeedDuration = 0;
                    return { status: 'MOVING', distance: this.totalDistance, accuracy, speed: speedMs * 3.6 };
                }

                return { status: 'NOISE', distance: this.totalDistance, accuracy };
            }
        }

        function App() {
            // Global State
            const [view, setView] = useState('splash');
            const [userData, setUserData] = useState(null);
            const [runs, setRuns] = useState([]); 
            const [vibe, setVibe] = useState("");
            const [modalData, setModalData] = useState(null);

            // UI Render State
            const [isRunning, setIsRunning] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [autoPaused, setAutoPaused] = useState(false);
            const [elapsed, setElapsed] = useState(0);
            const [distance, setDistance] = useState(0); 
            const [currentSpeed, setCurrentSpeed] = useState(0); 
            const [accuracy, setAccuracy] = useState(0);
            const [gpsStatus, setGpsStatus] = useState("WAITING");
            const [lastSummary, setLastSummary] = useState(null);

            // --- PRO LEVEL ADDITIONS ---
            const [pendingRun, setPendingRun] = useState(null);
            const [sharedRunData, setSharedRunData] = useState(null);
            
            // ADDED FOR FIX: Hoisted Auth States to prevent React Hooks crash (white screen fix)
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authError, setAuthError] = useState('');
            const [isAuthLoading, setIsAuthLoading] = useState(false);
            const [verificationEmail, setVerificationEmail] = useState('');

            // ADDED FOR FIX: Hoisted from views to prevent React Hooks crash
            const [inputName, setInputName] = useState("");
            const [copied, setCopied] = useState(false);

            // AI States
            const [aiBriefing, setAiBriefing] = useState(null);
            const [isBriefingLoading, setIsBriefingLoading] = useState(false);
            const [aiWorkout, setAiWorkout] = useState(null);
            const [isWorkoutLoading, setIsWorkoutLoading] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState(null);
            const [isAnalysisLoading, setIsAnalysisLoading] = useState(false);

            // Tracking Refs (Source of Truth for Stable Timer)
            const runDataRef = useRef({ startTime: 0, totalPausedTime: 0, pauseStartTime: 0, distance: 0, speed: 0, lastUiUpdate: 0 });
            const rAFRef = useRef(null);
            const watchRef = useRef(null);
            const gpsEngineRef = useRef(new GPSEngine());
            
            const isPausedRef = useRef(false);
            useEffect(() => { isPausedRef.current = isPaused; }, [isPaused]);

            // Startup & User Loading (+ URL Share Parser)
            useEffect(() => {
                // Check if we arrived via a public share link
                const hash = window.location.hash;
                if (hash.startsWith('#share=')) {
                    try {
                        const encodedData = hash.replace('#share=', '');
                        const data = decodeRunData(encodedData);
                        setSharedRunData(data);
                        setView('public_share');
                        return; // Halt normal initialization, user is just viewing a link
                    } catch(e) {
                        console.error("Invalid share link");
                    }
                }

                const timer = setTimeout(() => {
                    const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
                        setIsAuthLoading(false); // Reset loading state when auth state resolves
                        if (firebaseUser) {
                            // Check if email is verified (DISABLED AS REQUESTED)
                            // if (!firebaseUser.emailVerified) {
                            //     setVerificationEmail(firebaseUser.email);
                            //     signOut(auth);
                            //     setView('verify_email');
                            //     return;
                            // }

                            try {
                                // MIGRATION LOGIC TO SAVE EXISTING DATA ACROSS ACCOUNTS
                                const legacyUserStr = localStorage.getItem('runo_user');
                                if (legacyUserStr) {
                                    const legacyUser = JSON.parse(legacyUserStr);
                                    // If this legacy data has no UID, or if it matches the current user, migrate it.
                                    if (!legacyUser.uid || legacyUser.uid === firebaseUser.uid) {
                                        localStorage.setItem('runo_user_' + firebaseUser.uid, legacyUserStr);
                                        const legacyRuns = localStorage.getItem('runo_history');
                                        if (legacyRuns) localStorage.setItem('runo_history_' + firebaseUser.uid, legacyRuns);
                                        
                                        // Remove legacy keys so they don't get migrated to the next random account that logs in
                                        localStorage.removeItem('runo_user');
                                        localStorage.removeItem('runo_history');
                                    }
                                }

                                // Load User-Specific Data securely
                                const savedUser = localStorage.getItem('runo_user_' + firebaseUser.uid);
                                const savedRuns = localStorage.getItem('runo_history_' + firebaseUser.uid);
                                
                                if (savedUser) {
                                    setUserData(JSON.parse(savedUser));
                                } else {
                                    // Pull in dynamic values from Firebase Auth if available (like Google Sign In Name/Photo)
                                    const newUser = { 
                                        name: firebaseUser.displayName || "Athlete", 
                                        streak: 0, 
                                        totalKm: 0, 
                                        shields: 1, 
                                        joined: Date.now(), 
                                        profilePic: firebaseUser.photoURL || null, 
                                        uid: firebaseUser.uid 
                                    };
                                    setUserData(newUser);
                                    localStorage.setItem('runo_user_' + firebaseUser.uid, JSON.stringify(newUser));
                                }
                                
                                if (savedRuns) {
                                    setRuns(JSON.parse(savedRuns));
                                } else {
                                    setRuns([]); // Reset runs for new user to prevent data bleed
                                }
                                
                                // FIX: Only transition to home if we are coming from initial splash or onboarding
                                setView((currentView) => {
                                    if (currentView === 'splash' || currentView === 'onboarding') {
                                        return 'home';
                                    }
                                    return currentView;
                                });
                            } catch (e) {
                                console.error(e);
                            }
                        } else {
                            setView((currentView) => {
                                if (currentView !== 'verify_email' && currentView !== 'public_share') {
                                    return 'onboarding';
                                }
                                return currentView;
                            });
                        }
                    });

                    return () => unsubscribe();
                }, 1500);
                
                return () => clearTimeout(timer);
            }, []); // Removed `view` dependency to prevent infinite loops and forced re-routing

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const updatedUser = { ...userData, profilePic: reader.result };
                        setUserData(updatedUser);
                        try { 
                            localStorage.setItem('runo_user_' + userData.uid, JSON.stringify(updatedUser)); 
                            
                            // Also try to save it to Firebase Auth to persist across completely fresh devices!
                            if (auth.currentUser) {
                                await updateProfile(auth.currentUser, { photoURL: reader.result });
                            }
                        } catch (err) {}
                    };
                    reader.readAsDataURL(file);
                }
            };

            // --- TRACKING LOGIC ---
            const updateUI = useCallback(() => {
                const now = Date.now();
                if (now - runDataRef.current.lastUiUpdate >= 250) { // Higher frequency for smoother feel
                    let elapsedMs = 0;
                    if (isPausedRef.current) {
                        elapsedMs = runDataRef.current.pauseStartTime - runDataRef.current.startTime - runDataRef.current.totalPausedTime;
                    } else {
                        elapsedMs = now - runDataRef.current.startTime - runDataRef.current.totalPausedTime;
                    }
                    
                    setElapsed(Math.max(0, Math.floor(elapsedMs / 1000)));
                    setDistance(runDataRef.current.distance);
                    setCurrentSpeed(runDataRef.current.speed);
                    runDataRef.current.lastUiUpdate = now;
                }
                rAFRef.current = requestAnimationFrame(updateUI);
            }, []);

            // Permission handling and High Accuracy initialization
            const startRun = async () => {
                // 1. Request Permission explicitly
                if (navigator.permissions) {
                    try {
                        await navigator.permissions.query({ name: 'geolocation' });
                    } catch (e) {}
                }

                setIsRunning(true); 
                setIsPaused(false); 
                setAutoPaused(false); 
                setLastSummary(null); 
                setAiAnalysis(null);
                setDistance(0); 
                setElapsed(0); 
                setCurrentSpeed(0);
                setGpsStatus("WAITING");

                gpsEngineRef.current = new GPSEngine();
                runDataRef.current = { 
                    startTime: Date.now(), 
                    totalPausedTime: 0, 
                    pauseStartTime: 0, 
                    distance: 0, 
                    speed: 0, 
                    lastUiUpdate: 0 
                };

                if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
                rAFRef.current = requestAnimationFrame(updateUI);
                
                if (navigator.geolocation) {
                    // Start tracking with high accuracy settings
                    watchRef.current = navigator.geolocation.watchPosition((p) => {
                        setAccuracy(p.coords.accuracy);
                        
                        if (isPausedRef.current) return; 

                        const result = gpsEngineRef.current.processPoint(p);
                        
                        // Real-time GPS status updates
                        if (result.status === 'LOW_ACCURACY') {
                            setGpsStatus("POOR SIGNAL");
                            return;
                        }

                        if (result.status === 'LOCKING') {
                            setGpsStatus("LOCKING...");
                            return;
                        }
                        
                        if (result.status === 'REFINING') {
                            setGpsStatus("CALIBRATING");
                            return;
                        }

                        setGpsStatus("RECORDING");

                        if (result.status === 'MOVING' || result.status === 'LOCKED' || result.status === 'STATIONARY') {
                            if (autoPaused) setAutoPaused(false);
                            runDataRef.current.distance = result.distance;
                            runDataRef.current.speed = result.speed || 0;
                        } else if (result.status === 'AUTO_PAUSED') {
                            if (!autoPaused) {
                                setAutoPaused(true);
                                runDataRef.current.speed = 0;
                            }
                        }
                    }, (err) => {
                        console.error("GPS Error:", err);
                        setGpsStatus("ERROR");
                        setModalData({
                            title: 'GPS Required',
                            message: 'Please enable Location Services/GPS to properly track your run.',
                            onConfirm: () => {},
                            confirmText: 'Got It'
                        });
                    }, { 
                        enableHighAccuracy: true, 
                        maximumAge: 0, 
                        timeout: 10000 
                    });
                } else {
                    setModalData({
                        title: 'Not Supported',
                        message: 'Geolocation tracking is not supported by your current browser.',
                        onConfirm: () => {},
                        confirmText: 'Okay'
                    });
                }
            };

            const stopRun = () => { 
                if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
                if (watchRef.current) navigator.geolocation.clearWatch(watchRef.current);
                
                const finalDistance = runDataRef.current.distance;
                const now = Date.now();
                let elapsedMs = isPausedRef.current ? 
                    (runDataRef.current.pauseStartTime - runDataRef.current.startTime - runDataRef.current.totalPausedTime) : 
                    (now - runDataRef.current.startTime - runDataRef.current.totalPausedTime);
                
                const finalElapsed = Math.max(0, Math.floor(elapsedMs / 1000));
                const finalDistanceKm = finalDistance / 1000;
                const paceString = formatPace(finalElapsed, finalDistance);
                const calories = Math.floor(finalDistanceKm * 75 * 1.036); // Precision Calorie calc

                // MUCH STRICTER threshold: Force naming modal even on small runs (e.g. 2 meters or 5 seconds)
                if (finalDistance > 2 || finalElapsed > 5) { 
                    setInputName(""); // Reset name for fresh entry
                    setPendingRun({
                        id: Date.now().toString(),
                        timestamp: Date.now(),
                        duration: finalElapsed,
                        distance: finalDistance,
                        pace: paceString,
                        calories: calories
                    });
                    setView('save_run'); 
                } else {
                    // Only drop completely 0m / super quick test runs
                    setLastSummary({ distance: 0, duration: 0, pace: "0:00" });
                    setView('home');
                }
                
                setIsRunning(false);
            };

            // Triggered after user enters a mandatory run name
            const saveCompletedRun = (runName) => {
                const summary = { ...pendingRun, name: runName };
                setLastSummary(summary);
                
                const updatedRuns = [summary, ...runs];
                setRuns(updatedRuns);
                localStorage.setItem('runo_history_' + userData.uid, JSON.stringify(updatedRuns));

                const finalDistanceKm = summary.distance / 1000;
                const updatedUser = { 
                    ...userData, 
                    streak: (userData?.streak || 0) + 1, 
                    totalKm: (userData?.totalKm || 0) + finalDistanceKm 
                };
                setUserData(updatedUser);
                localStorage.setItem('runo_user_' + userData.uid, JSON.stringify(updatedUser));
                setPendingRun(null);
                setView('post_save_share'); // Proceed to new share screen
            };

            // Enhanced Delete functionality using Custom GlobalModal
            const confirmDeleteRun = (id) => {
                setModalData({
                    title: 'Delete Mission?',
                    message: 'Permanently delete this mission from your records? This action cannot be undone.',
                    onConfirm: () => {
                        const newRuns = runs.filter(r => r.id !== id);
                        setRuns(newRuns);
                        localStorage.setItem('runo_history_' + userData.uid, JSON.stringify(newRuns));
                    },
                    onCancel: () => {},
                    confirmText: 'Delete',
                    cancelText: 'Keep It'
                });
            };

            const togglePause = () => {
                if (!isPaused) {
                    setIsPaused(true);
                    runDataRef.current.pauseStartTime = Date.now();
                    runDataRef.current.speed = 0;
                    gpsEngineRef.current.pause(); 
                } else {
                    setIsPaused(false);
                    setAutoPaused(false);
                    runDataRef.current.totalPausedTime += (Date.now() - runDataRef.current.pauseStartTime);
                }
            };

            // Formatting Functions
            const formatPace = (totalSeconds, distanceMeters) => {
                if (distanceMeters < 10 || totalSeconds === 0) return "0:00";
                const pace = totalSeconds / (distanceMeters / 1000);
                if (pace > 3599) return "59:59"; 
                return `${Math.floor(pace / 60)}:${Math.floor(pace % 60).toString().padStart(2, '0')}`;
            };

            const formatTime = (totalSeconds) => {
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                return `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            // Helper to generate dynamic Run Names based on distance and time
            const getSmartSuggestions = () => {
                if(!pendingRun) return [];
                const distKm = pendingRun.distance / 1000;
                const hrs = new Date().getHours();
                const timeOfDay = hrs < 12 ? "Morning" : hrs < 17 ? "Afternoon" : "Evening";
                
                let intenseAdj = distKm > 10 ? "Beast Mode" : distKm > 5 ? "Grind" : "Sprint";
                let friendlyDist = distKm < 1 ? "Quick Dash" : `${distKm.toFixed(0)}K`;

                return [
                    `${timeOfDay} ${intenseAdj}`,
                    `${friendlyDist} Comeback`,
                    `The ${timeOfDay} Push`,
                    `Lunchbreak Hustle`
                ];
            };

            // Enhanced Share Feature with Fallback UI
            const handleShareAction = async (runObj) => {
                const shareUrl = `${window.location.origin}${window.location.pathname}#share=${encodeRunData(runObj)}`;
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: `Check out my ${runObj.name} on Runo!`,
                            text: `I just ran ${(runObj.distance/1000).toFixed(2)}km in ${formatTime(runObj.duration)}!`,
                            url: shareUrl
                        });
                    } catch (err) {
                        console.error('Native share failed', err);
                    }
                } else {
                    // Safe iframe/fallback cross-browser copy mechanism
                    const textArea = document.createElement("textarea");
                    textArea.value = shareUrl;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                    } catch (err) {
                        console.error('Copy failed', err);
                    }
                    document.body.removeChild(textArea);
                    
                    setModalData({
                        title: 'Link Copied!',

                        onConfirm: () => {},
                        confirmText: 'Awesome'
                    });
                }
            };

            // Enhanced Logout with Custom Modal
            const handleLogoutRequest = () => {
                setModalData({
                    title: 'Logout Request',
                    message: 'Are you sure? This will securely sign you out of your account.',
                    onConfirm: async () => { 
                        try {
                            setUserData(null); // Clear sensitive data from memory securely
                            setRuns([]); // Clear run history from memory
                            await signOut(auth);
                            setView('onboarding'); 
                        } catch (error) {
                            console.error('Error signing out', error);
                        }
                    },
                    onCancel: () => {},
                    confirmText: 'Logout',
                    cancelText: 'Cancel'
                });
            };

            // AI Functions
            const fetchBriefing = async () => {
                setIsBriefingLoading(true);
                const res = await callGemini(`User streak: ${userData.streak} days. Total: ${userData.totalKm.toFixed(1)}km. Generate a 2-sentence elite tactical morning briefing.`);
                setAiBriefing(res || "Focus on consistency today. Your momentum is your greatest asset.");
                setIsBriefingLoading(false);
            };

            const fetchWorkout = async (v) => {
                setIsWorkoutLoading(true);
                const res = await callGemini(`Feeling: ${v}. Generate a 10-minute circuit with 4 bodyweight exercises.`);
                setAiWorkout(res || "1. Jump Squats\n2. Narrow Pushups\n3. Mountain Climbers\n4. High Plank");
                setIsWorkoutLoading(false);
            };

            const fetchAnalysis = async () => {
                setIsAnalysisLoading(true);
                const res = await callGemini(`Analyze run: ${(lastSummary.distance/1000).toFixed(2)}km in ${Math.floor(lastSummary.duration/60)}m. Provide 1 tactical insight and 1 recovery tip.`);
                setAiAnalysis(res || "Session validated. Excellent pacing. Prioritize myofascial release and protein intake for recovery.");
                setIsAnalysisLoading(false);
            };

            // --- SCREENS ---

            // Custom Global Modal UI (Fixes all iframe alert/confirm issues)
            const GlobalModal = () => {
                if (!modalData) return null;
                return (
                    <div className="absolute inset-0 z-[1000] bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-6 animate__animated animate__fadeIn">
                        <div className="bg-white rounded-[2rem] p-8 w-full max-w-sm border-2 border-slate-900 shadow-[4px_6px_0px_#0f172a] animate__animated animate__zoomIn animate__faster">
                            <div className="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center mb-6 border border-slate-200">
                                <Icon name="Activity" size={24} color="#0f172a" />
                            </div>
                            <h3 className="text-2xl font-black text-slate-900 uppercase mb-2 leading-tight">{modalData.title}</h3>
                            <p className="text-slate-600 font-bold text-sm mb-8 leading-relaxed">{modalData.message}</p>
                            {modalData.content && <div className="mb-6">{modalData.content}</div>}
                            <div className="flex gap-3">
                                {modalData.onCancel && (
                                    <button onClick={() => { modalData.onCancel(); setModalData(null); }} className="flex-1 py-4 bg-slate-100 text-slate-700 rounded-xl font-black uppercase text-xs border-2 border-transparent active:scale-95 transition-transform">
                                        {modalData.cancelText || 'Cancel'}
                                    </button>
                                )}
                                <button onClick={() => { modalData.onConfirm(); setModalData(null); }} className="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black uppercase text-xs shadow-[2px_3px_0px_#0f172a] border-2 border-slate-900 active:translate-y-1 active:shadow-none transition-all">
                                    {modalData.confirmText || 'Confirm'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const Splash = () => (
                <div className="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center animate__animated animate__fadeIn z-[200] w-full h-full">

                        <Icon name="Activity" size={48} color="white" className="-rotate-45" />
                    </div>
                </div>
            );

            const Onboarding = () => { // Firebase Auth Implementation
                const handleSignIn = async () => {
                    if (!authEmail || !authPassword) return setAuthError("Please enter email and password");
                    setIsAuthLoading(true);
                    setAuthError('');
                    try {
                        const userCredential = await signInWithEmailAndPassword(auth, authEmail, authPassword);
                        // EMAIL VERIFICATION DISABLED:
                        // if (!userCredential.user.emailVerified) {
                        //     setVerificationEmail(userCredential.user.email);
                        //     await signOut(auth);
                        //     setIsAuthLoading(false);
                        //     setView('verify_email');
                        //     return;
                        // }
                        // onAuthStateChanged handles redirect to home
                    } catch (error) {
                        setAuthError("Email or password is incorrect");
                        setIsAuthLoading(false);
                    }
                };

                const handleSignUp = async () => {
                    if (!authEmail || !authPassword) return setAuthError("Please enter email and password");
                    setIsAuthLoading(true);
                    setAuthError('');
                    try {
                        const userCredential = await createUserWithEmailAndPassword(auth, authEmail, authPassword);
                        // EMAIL VERIFICATION DISABLED:
                        // await sendEmailVerification(userCredential.user);
                        // await signOut(auth); // Sign out immediately to prevent auto-login
                        // setVerificationEmail(authEmail);
                        // setIsAuthLoading(false);
                        // setView('verify_email');
                    } catch (error) {
                        if (error.code === 'auth/email-already-in-use') {
                            setAuthError("User already exists. Please sign in");
                        } else {
                            setAuthError(error.message);
                        }
                        setIsAuthLoading(false);
                    }
                };

                const handleGoogleSignIn = async () => {
                    setIsAuthLoading(true);
                    setAuthError('');
                    const provider = new GoogleAuthProvider();
                    try {
                        await signInWithPopup(auth, provider);
                        // onAuthStateChanged handles redirect
                    } catch (error) {
                        setAuthError(error.message);
                        setIsAuthLoading(false);

                };

                return (
                    <div className="absolute inset-0 bg-slate-900 text-white p-8 flex flex-col justify-center items-center text-center z-[150] animate__animated animate__fadeIn w-full h-full">
                        <div className="w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-[4px_6px_0px_#0f172a] border-2 border-slate-900">
                            <Icon name="User" size={48} color="white" />
                        </div>
                        <h1 className="text-6xl font-black tracking-tighter mb-4 animate__animated animate__fadeInUp">Welcome.</h1>
                        <p className="text-slate-300 mb-12 uppercase tracking-widest text-xs font-bold leading-relaxed">Your fitness journey<br/>begins now.</p>
                        
                        <div className="w-full max-w-[320px] space-y-4">
                            <input 
                                type="email" 
                                placeholder="Email" 
                                value={authEmail}

                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>

                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

                                <div className="h-[1px] flex-1 bg-slate-700"></div>

                            >
                                {isAuthLoading ? <Icon name="Loader2" className="animate-spin text-white" size={24}/> : "CREATE ACCOUNT"}
                            </button>
                        </div>
                    </div>
                );
            };

            const VerifyEmailView = () => {
                return (
                    <div className="absolute inset-0 bg-slate-900 text-white p-8 flex flex-col justify-center items-center text-center z-[150] animate__animated animate__fadeIn w-full h-full">

                        <div className="w-full max-w-[320px] space-y-4">

                                onClick={() => setView('onboarding')}

                        <div>
                            <p className="text-xs font-bold uppercase tracking-widest text-slate-500">Runo Fitness</p>

                        <div className="bg-white px-5 py-2.5 rounded-full font-bold flex items-center gap-2 fitness-card text-slate-900">

                        </div>
                    </header>

                    {/* AI Briefing Card */}
                    <div className="mb-8 p-6 bg-white rounded-[2rem] fitness-card relative overflow-hidden">
                        <div className="flex justify-between items-center mb-3 relative z-10">
                            <p className="text-[10px] font-black uppercase tracking-widest text-blue-600 flex items-center gap-1">
                                <Icon name="Zap" size={14} color="#2563eb" /> AI Coach
                            </p>
                            <button onClick={fetchBriefing} disabled={isBriefingLoading} className="p-2 bg-slate-100 rounded-full active:scale-95 transition-transform border border-slate-300">
                                {isBriefingLoading ? <Icon name="Loader2" className="animate-spin text-slate-900" size={14}/> : <Icon name="RefreshCcw" size={14} color="#0f172a"/>}

                        <div className="relative z-10 min-h-[40px]">
                            {aiBriefing ? (
                                <p className="text-sm font-semibold leading-relaxed text-slate-800 animate__animated animate__fadeIn">{aiBriefing}</p>

                                <p className="text-sm text-slate-400 italic font-medium mt-1">Tap refresh to sync your daily tactical protocol.</p>
                            )}
                        </div>
                    </div>

                            <div className="water-wave-secondary"></div>
                            <div className="water-wave-tertiary"></div>

                        <div className="p-6 bg-purple-600 rounded-[2rem] fitness-card">
                            <Icon name="Shield" size={32} color="#e9d5ff" className="mb-4" />
                            <p className="text-[10px] font-black text-purple-200 uppercase tracking-widest mb-1">Streak Shields</p>
                            <p className="text-3xl font-black tracking-tighter text-white">{userData?.shields || 1}</p>

                            <p className="text-xs font-black uppercase tracking-widest text-slate-500">AI Personal Training & Stats</p>

                                        >
                                            {v}
                                        </button>
                                    ))}

                                    {isWorkoutLoading ? <Icon name="Loader2" className="animate-spin text-white" size={20}/> : <><Icon name="Zap" size={18} color="white"/> Generate Circuit</>}
                                </button>
                            </div>
                            <Icon name="Zap" size={200} color="rgba(255,255,255,0.03)" className="absolute -right-10 top-0 pointer-events-none" />
                        </div>

                        {aiWorkout && (
                            <div className="p-8 bg-white border-2 border-slate-900 rounded-[2.5rem] shadow-[4px_6px_0px_#0f172a] mb-8 animate__animated animate__fadeInUp">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center border border-slate-900 shadow-[2px_2px_0px_#0f172a]">
                                        <Icon name="Flame" size={20} color="#ea580c"/>
                                    </div>
                                    <h4 className="font-black text-xl text-slate-900">Custom Protocol</h4>
                                </div>
                                <pre className="whitespace-pre-wrap font-sans text-sm font-medium leading-relaxed text-slate-700">{aiWorkout}</pre>
                            </div>
                        )}

                                {[40, 70, 45, 90, 60, 30, 80].map((h, i) => (
                                    <div key={i} className="flex-1 flex flex-col items-center gap-3">
                                        <div className="w-full bg-slate-800 rounded-t-md relative overflow-hidden" style={{ height: `${h}%` }}>
                                            {i === 3 && <div className="absolute inset-0 bg-blue-500"></div>}
                                        </div>
                                        <span className="text-[10px] font-black text-slate-400">{"MTWTFSS"[i]}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="mb-8">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-black text-xl uppercase text-slate-900 flex items-center gap-2">
                                    <Icon name="BarChart2" size={20} color="#0f172a"/> Recent Activity
                                </h3>
                                {runs.length > 0 && (
                                    <button onClick={() => setView('history')} className="text-xs font-black text-blue-600 uppercase tracking-widest active:scale-95 transition-transform flex items-center gap-1">
                                        Full History <Icon name="ChevronRight" size={14} color="#2563eb" />
                                    </button>
                                )}
                            </div>
                            <div className="space-y-4">
                                {runs.length > 0 ? runs.slice(0, 5).map(run => (
                                    <div key={run.id} className="p-6 bg-white rounded-[2rem] border-2 border-slate-900 shadow-[4px_4px_0px_#0f172a] flex justify-between items-center">
                                        <div>
                                            <p className="font-black text-slate-900 uppercase text-sm tracking-tight">{run.name || "Mission"}</p>
                                            <div className="flex items-center gap-2 mt-1">
                                                <Icon name="Calendar" size={12} color="#64748b"/>
                                                <span className="text-[10px] font-bold text-slate-500 uppercase">{new Date(run.timestamp).toLocaleDateString()}</span>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-black text-blue-600 text-lg leading-none">
                                                {run.distance < 1000 ? `${Math.floor(run.distance)}m` : `${(run.distance / 1000).toFixed(2)}km`}
                                            </p>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mt-1">{run.pace}/km</p>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="p-8 text-center bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-300">
                                        <p className="text-slate-400 font-bold text-sm">No recorded missions yet.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

                const suggestions = getSmartSuggestions();

                            <input 
                                type="text"
                                value={inputName}
                                onChange={(e) => setInputName(e.target.value)}
                                placeholder="e.g., Morning Beast Mode"
                                className="w-full bg-slate-900 border-2 border-slate-700 text-white rounded-2xl p-6 text-xl font-black focus:outline-none focus:border-blue-500 transition-colors mb-6 shadow-inner"
                                autoFocus
                            />

                            <div className="flex flex-wrap gap-2 mb-8">
                                {suggestions.map(s => (
                                    <button 
                                        key={s} 
                                        onClick={() => setInputName(s)}
                                        className="bg-slate-800 text-slate-300 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95 transition-transform"
                                    >
                                        {s}
                                    </button>
                                ))}

                                * A mission name is strictly required to save

                            <button 
                                onClick={() => saveCompletedRun(inputName)}
                                disabled={!inputName.trim()}
                                className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg disabled:opacity-50 disabled:grayscale transition-all uppercase tracking-widest border-2 border-slate-900 shadow-[4px_6px_0px_#0f172a] flex justify-center items-center gap-3"
                            >
                                Save Run <Icon name="ChevronRight" size={20} color="white" />
                            </button>
                        </div>
                    </div>
                );
            };

            const PostSaveShareView = () => {
                const handleCopy = () => {
                    const shareUrl = `${window.location.origin}${window.location.pathname}#share=${encodeRunData(lastSummary)}`;
                    const textArea = document.createElement("textarea");
                    textArea.value = shareUrl;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    } catch (err) {
                        console.error('Copy failed', err);
                    }
                    document.body.removeChild(textArea);
                };

                return (
                    <div className="absolute inset-0 z-[250] bg-slate-900 text-white p-8 flex flex-col justify-center items-center text-center animate__animated animate__zoomIn w-full h-full">
                        <div className="absolute inset-0 running-bg-glow opacity-50 pointer-events-none"></div>
                        <div className="relative z-10 w-full max-w-sm">
                            <Icon name="Flame" size={64} color="#ea580c" className="mx-auto mb-6 animate__animated animate__bounceIn" />
                            <h2 className="text-4xl font-black tracking-tighter mb-2">Run Saved.</h2>
                            <p className="text-slate-400 font-bold text-xs uppercase tracking-widest mb-10">Your legacy is recorded.</p>
                            
                            <div className="bg-slate-800 rounded-3xl p-6 mb-8 border border-slate-700 text-left">
                                <p className="font-black text-xl mb-4 truncate text-blue-400">{lastSummary?.name}</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Distance</p>
                                        <p className="text-2xl font-black">{(lastSummary?.distance/1000).toFixed(2)}<span className="text-sm">km</span></p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Time</p>
                                        <p className="text-2xl font-black">{formatTime(lastSummary?.duration)}</p>
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => handleShareAction(lastSummary)} className="w-full py-5 bg-white text-slate-900 rounded-2xl font-black text-sm uppercase tracking-widest flex justify-center items-center gap-3 mb-4 fitness-card active:translate-y-1">
                                <Icon name="Share2" size={20} color="#0f172a" /> Share Performance
                            </button>
                            
                            <button onClick={handleCopy} className="w-full py-5 bg-slate-800 text-white rounded-2xl font-black text-sm uppercase tracking-widest flex justify-center items-center gap-3 mb-8 border border-slate-700 active:bg-slate-700 transition-colors">
                                {copied ? <Icon name="CheckCircle" size={20} color="#4ade80" /> : <Icon name="Copy" size={20} color="white" />} 
                                {copied ? "Copied Link!" : "Copy Public Link"}
                            </button>

                            <button onClick={() => setView('run')} className="text-xs font-black text-slate-500 uppercase tracking-widest underline decoration-slate-600 underline-offset-4 active:text-white transition-colors">
                                Continue to Summary
                            </button>
                        </div>
                    </div>
                );
            };

            const HistoryView = () => (
                <div className="absolute inset-0 z-[100] bg-slate-100 text-slate-900 flex flex-col animate__animated animate__slideInRight w-full h-full">
                    <header className="px-6 pt-16 pb-6 border-b-2 border-slate-900 bg-white flex items-center justify-between sticky top-0 z-20 shadow-[0_4px_0px_#0f172a]">
                        <button onClick={() => setView('stats')} className="p-3 bg-slate-100 rounded-xl active:scale-95 transition-transform border border-slate-300">
                            <Icon name="ChevronLeft" size={24} color="#0f172a"/>
                        </button>
                        <h2 className="text-2xl font-black tracking-tighter uppercase text-slate-900 flex items-center gap-2">
                            <Icon name="History" size={24} color="#0f172a" /> Run History

                        <div className="w-12"></div>
                    </header>
                    <div className="flex-1 overflow-y-auto p-6 custom-scroll space-y-4 bg-slate-100">

                                <Icon name="Activity" size={48} color="#cbd5e1" className="mx-auto mb-4" />
                                <p className="text-slate-400 font-bold">No runs recorded yet.</p>
                            </div>
                        ) : (
                            runs.map(run => (
                                <div key={run.id} className="p-6 bg-white rounded-[2rem] border-2 border-slate-900 shadow-[4px_4px_0px_#0f172a] relative overflow-hidden group">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="pr-4">
                                            <p className="font-black text-slate-900 uppercase text-lg tracking-tight leading-tight">{run.name || "Mission"}</p>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1 flex items-center gap-1">
                                                <Icon name="Calendar" size={10} color="#64748b"/>
